<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#5b8af5"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#070910"/>
  <!-- Icon: arc + 3 candles, extracted from F1 brand concept small icon -->
  <!-- Original local coords: x 0–35, y 0–28 → scale 0.82 + translate(1.5, 3) -->
  <g transform="translate(1.5, 3) scale(0.82)">
    <!-- Almost-full-circle gradient arc -->
    <path d="M 18 0 A 18 18 0 1 0 35 28"
          stroke="url(#g)" stroke-width="2.8" stroke-linecap="round"
          filter="url(#glow)"/>
    <!-- Red candle -->
    <line x1="9" y1="11" x2="9" y2="14" stroke="rgba(248,113,113,0.55)" stroke-width="1.3" stroke-linecap="round"/>
    <rect x="6" y="14" width="6" height="8" rx="1" fill="none" stroke="#f87171" stroke-width="1.3"/>
    <line x1="9" y1="22" x2="9" y2="25" stroke="rgba(248,113,113,0.55)" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Purple candle (solid gradient fill) -->
    <line x1="18" y1="7" x2="18" y2="10" stroke="rgba(124,106,247,0.65)" stroke-width="1.3" stroke-linecap="round"/>
    <rect x="15" y="10" width="6" height="13" rx="1" fill="url(#g)"/>
    <line x1="18" y1="23" x2="18" y2="26" stroke="rgba(124,106,247,0.65)" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Green candle -->
    <line x1="27" y1="9" x2="27" y2="12" stroke="rgba(52,211,153,0.55)" stroke-width="1.3" stroke-linecap="round"/>
    <rect x="24" y="12" width="6" height="10" rx="1" fill="none" stroke="#34d399" stroke-width="1.3"/>
    <line x1="27" y1="22" x2="27" y2="25" stroke="rgba(52,211,153,0.55)" stroke-width="1.3" stroke-linecap="round"/>
  </g>
</svg>
