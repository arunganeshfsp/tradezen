<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#5b8af5"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14113a"/>
      <stop offset="100%" stop-color="#0c1432"/>
    </linearGradient>
    <filter id="gw" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded-square background (matches F3 app icon) -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect width="32" height="32" rx="7" stroke="rgba(124,106,247,0.28)" stroke-width="1" fill="none"/>
  <!-- C-arc -->
  <path d="M16 4 A10 10 0 1 0 26 16" stroke="url(#g1)" stroke-width="2.2" stroke-linecap="round" filter="url(#gw)"/>
  <!-- Bearish (red) candle -->
  <line x1="9"  y1="13" x2="9"  y2="15" stroke="rgba(248,113,113,0.5)" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="6"  y="15" width="6" height="9"  rx="1.2" fill="rgba(248,113,113,0.2)" stroke="#f87171" stroke-width="1"/>
  <line x1="9"  y1="24" x2="9"  y2="26" stroke="rgba(248,113,113,0.5)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Neutral (purple) candle -->
  <line x1="16" y1="8"  x2="16" y2="10" stroke="rgba(124,106,247,0.65)" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="13" y="10" width="6" height="13" rx="1.2" fill="url(#g1)"/>
  <line x1="16" y1="23" x2="16" y2="25" stroke="rgba(124,106,247,0.65)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Bullish (green) candle -->
  <line x1="23" y1="10" x2="23" y2="12" stroke="rgba(52,211,153,0.55)" stroke-width="1.4" stroke-linecap="round"/>
  <rect x="20" y="12" width="6" height="10" rx="1.2" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1"/>
  <line x1="23" y1="22" x2="23" y2="24" stroke="rgba(52,211,153,0.55)" stroke-width="1.4" stroke-linecap="round"/>
</svg>
