<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TradeZen — Server Launcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3e;
      --text: #e2e8f0;
      --muted: #6b7280;
      --green: #22c55e;
      --red: #ef4444;
      --orange: #f59e0b;
      --blue: #3b82f6;
      --purple: #8b5cf6;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    header h1 span { color: var(--blue); }
    header p { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }

    .global-bar {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.4s;
      box-shadow: 0 0 0 0 transparent;
    }
    .dot.online {
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    .dot.offline { background: var(--red); }
    .dot.pending { background: var(--orange); animation: blink 0.7s infinite; }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 6px var(--green); }
      50%       { box-shadow: 0 0 14px var(--green); }
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .card-title {
      flex: 1;
    }
    .card-title h2 { font-size: 1.05rem; font-weight: 600; }
    .card-title .addr { font-size: 0.78rem; color: var(--muted); font-family: monospace; }

    .status-badge {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-badge.online  { background: rgba(34,197,94,0.15);  color: var(--green); }
    .status-badge.offline { background: rgba(239,68,68,0.15);  color: var(--red); }
    .status-badge.pending { background: rgba(245,158,11,0.15); color: var(--orange); }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 16px;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:hover  { opacity: 0.85; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

    .btn-start   { background: var(--green);  color: #fff; }
    .btn-stop    { background: var(--red);    color: #fff; }
    .btn-restart { background: var(--orange); color: #fff; }
    .btn-all-start  { background: var(--blue);   color: #fff; }
    .btn-all-stop   { background: #374151;        color: var(--text); }

    .log-toggle {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      padding: 5px 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .log-toggle:hover { color: var(--text); border-color: var(--text); opacity: 1; }

    .log-box {
      background: #0d1017;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      height: 180px;
      overflow-y: auto;
      font-family: 'Cascadia Code', 'Courier New', monospace;
      font-size: 0.72rem;
      line-height: 1.6;
      color: #9ca3af;
      display: none;
    }
    .log-box.visible { display: block; }
    .log-box p { margin: 0; white-space: pre-wrap; word-break: break-all; }
    .log-box p.err { color: var(--red); }
    .log-box p.info { color: #60a5fa; }

    .refresh-note {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 24px;
    }
    #last-checked { color: var(--text); }
  </style>
</head>
<body>

<header>
  <h1>Trade<span>Zen</span> Launcher</h1>
  <p>Server control panel — running on port 9999</p>
</header>

<div class="global-bar">
  <button class="btn-all-start" onclick="startAll()">&#9654; Start All</button>
  <button class="btn-all-stop"  onclick="stopAll()">&#9632; Stop All</button>
</div>

<div class="cards">

  <!-- Python Card -->
  <div class="card" id="card-python">
    <div class="card-header">
      <div class="dot" id="dot-python"></div>
      <div class="card-title">
        <h2>Python (FastAPI)</h2>
        <div class="addr">http://127.0.0.1:8000</div>
      </div>
      <span class="status-badge offline" id="badge-python">Offline</span>
    </div>
    <div class="btn-row">
      <button class="btn-start"   onclick="action('start','python')">Start</button>
      <button class="btn-stop"    onclick="action('stop','python')">Stop</button>
      <button class="btn-restart" onclick="action('restart','python')">Restart</button>
    </div>
    <button class="log-toggle" onclick="toggleLog('python')">Show Logs</button>
    <div class="log-box" id="log-python"></div>
  </div>

  <!-- Node Card -->
  <div class="card" id="card-node">
    <div class="card-header">
      <div class="dot" id="dot-node"></div>
      <div class="card-title">
        <h2>Node.js (Express)</h2>
        <div class="addr">http://localhost:3000</div>
      </div>
      <span class="status-badge offline" id="badge-node">Offline</span>
    </div>
    <div class="btn-row">
      <button class="btn-start"   onclick="action('start','node')">Start</button>
      <button class="btn-stop"    onclick="action('stop','node')">Stop</button>
      <button class="btn-restart" onclick="action('restart','node')">Restart</button>
    </div>
    <button class="log-toggle" onclick="toggleLog('node')">Show Logs</button>
    <div class="log-box" id="log-node"></div>
  </div>

</div>

<p class="refresh-note">Auto-refreshing every 3 s &nbsp;|&nbsp; Last checked: <span id="last-checked">—</span></p>

<script>
  const logVisible = { python: false, node: false };

  function setStatus(srv, online) {
    const dot   = document.getElementById(`dot-${srv}`);
    const badge = document.getElementById(`badge-${srv}`);
    dot.className   = 'dot ' + (online ? 'online' : 'offline');
    badge.className = 'status-badge ' + (online ? 'online' : 'offline');
    badge.textContent = online ? 'Online' : 'Offline';
  }

  function setPending(srv) {
    const dot   = document.getElementById(`dot-${srv}`);
    const badge = document.getElementById(`badge-${srv}`);
    dot.className   = 'dot pending';
    badge.className = 'status-badge pending';
    badge.textContent = 'Pending…';
  }

  async function refreshStatus() {
    try {
      const res  = await fetch('/api/status');
      const data = await res.json();
      setStatus('python', data.python);
      setStatus('node',   data.node);
      document.getElementById('last-checked').textContent = new Date().toLocaleTimeString();
    } catch (_) {}
  }

  async function refreshLogs(srv) {
    if (!logVisible[srv]) return;
    try {
      const res  = await fetch(`/api/logs/${srv}`);
      const data = await res.json();
      const box  = document.getElementById(`log-${srv}`);
      box.innerHTML = data.logs.map((l) => {
        const cls = l.includes('ERROR') || l.includes('error') ? 'err'
                  : l.includes('INFO')  || l.includes('info')  ? 'info' : '';
        return `<p class="${cls}">${escHtml(l)}</p>`;
      }).join('');
      box.scrollTop = box.scrollHeight;
    } catch (_) {}
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function action(type, srv) {
    setPending(srv);
    try {
      await fetch(`/api/${type}/${srv}`, { method: 'POST' });
    } catch (_) {}
    setTimeout(refreshStatus, 2000);
    setTimeout(refreshStatus, 5000);
  }

  async function startAll() {
    setPending('python');
    setPending('node');
    try { await fetch('/api/start/all', { method: 'POST' }); } catch (_) {}
    setTimeout(refreshStatus, 3000);
    setTimeout(refreshStatus, 8000);
    setTimeout(refreshStatus, 14000);
  }

  async function stopAll() {
    setPending('python');
    setPending('node');
    try { await fetch('/api/stop/all', { method: 'POST' }); } catch (_) {}
    setTimeout(refreshStatus, 2000);
  }

  function toggleLog(srv) {
    logVisible[srv] = !logVisible[srv];
    const box = document.getElementById(`log-${srv}`);
    const btn = box.previousElementSibling;
    box.classList.toggle('visible', logVisible[srv]);
    btn.textContent = logVisible[srv] ? 'Hide Logs' : 'Show Logs';
    if (logVisible[srv]) refreshLogs(srv);
  }

  // Poll status + logs
  refreshStatus();
  setInterval(refreshStatus, 3000);
  setInterval(() => { refreshLogs('python'); refreshLogs('node'); }, 3000);
</script>
</body>
</html>
