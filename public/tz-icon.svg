<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 28 28" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c6af7"/>
      <stop offset="100%" stop-color="#5b8af5"/>
    </linearGradient>
    <filter id="gw" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- C-arc open bottom-right -->
  <path d="M14 3 A9 9 0 1 0 23 14" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" filter="url(#gw)"/>
  <!-- Bearish (red) candle -->
  <line x1="8"  y1="11" x2="8"  y2="13" stroke="rgba(248,113,113,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="5"  y="13" width="5" height="8" rx="1" fill="rgba(248,113,113,0.18)" stroke="#f87171" stroke-width="0.9"/>
  <line x1="8"  y1="21" x2="8"  y2="23" stroke="rgba(248,113,113,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Neutral (purple) candle — tallest -->
  <line x1="14" y1="7"  x2="14" y2="9"  stroke="rgba(124,106,247,0.6)" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="11" y="9"  width="5" height="12" rx="1" fill="url(#g1)"/>
  <line x1="14" y1="21" x2="14" y2="23" stroke="rgba(124,106,247,0.6)" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bullish (green) candle -->
  <line x1="20" y1="9"  x2="20" y2="11" stroke="rgba(52,211,153,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <rect x="17" y="11" width="5" height="9"  rx="1" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="0.9"/>
  <line x1="20" y1="20" x2="20" y2="22" stroke="rgba(52,211,153,0.5)" stroke-width="1.2" stroke-linecap="round"/>
</svg>
