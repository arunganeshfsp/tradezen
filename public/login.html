<!DOCTYPE html>
<html>
<head>
  <title>TradeZen Login</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>TradeZen Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <script>
    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: user.value,
          password: pass.value
        })
      });

      if (res.ok) {
        window.location.href = "/";
      } else {
        alert("Invalid login");
      }
    }
  </script>
</body>
</html>
