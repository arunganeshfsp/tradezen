<!DOCTYPE html>
<html>
<head>
  <title>TradeZen Login</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #1e293b;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #22c55e;
      border: none;
      color: white;
    }
  </style>
</head>
<body>
<div class="tz-bg-orb tz-orb1"></div>
<div class="tz-bg-orb tz-orb2"></div>
<div class="tz-grid"></div>
<nav class="tz-nav">
  <div class="tz-nav-inner">
    <a href="index.html" class="tz-logo">
      <div class="tz-logo-mark">TZ</div>
      <span class="tz-logo-text">Trade<span>Zen</span></span>
    </a>
    <div class="tz-nav-links">
      <a href="butterfly_straddle_tamil.html">🦋 Butterfly</a>
      <a href="options_entry_tool_tamil.html">🎯 Buying</a>
      <a href="options_selling_tool_tamil.html">💰 Selling</a>
      <a href="swing_trading_tool_tamil.html">📈 Swing</a>
      <a href="theta_decay_tamil.html">⏳ Theta</a>
      <a href="fno_signal.html">🤖 F&O</a>
      <a href="contact.html">✉ Contact</a>
    </div>
  </div>
</nav>
  <div class="card">
    <h2>TradeZen Login</h2>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <script>
    async function login() {
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: user.value,
          password: pass.value
        })
      });

      if (res.ok) {
        window.location.href = "/";
      } else {
        alert("Invalid login");
      }
    }
  </script>
</body>
</html>
