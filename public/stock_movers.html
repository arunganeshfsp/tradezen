  <style>
    :root{
      --bg:#0A0C18;--bg1:#0e1020;--bg2:#13162b;--bg3:#1a1e35;--bg4:#20253e;
      --border:#252a44;--border2:#323868;
      --accent:#7c6af7;--blue:#5b8af5;
      --green:#2ecc71;--green2:#27ae60;
      --red:#e74c3c;--red2:#c0392b;
      --cyan:#00d4ff;
      --text:#e8ecf4;--dim:#9ba3bf;--muted:#7b84a8;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh}

    /* ── Nav ── */
    nav{display:flex;align-items:center;gap:0;padding:0 24px;height:52px;background:rgba(10,12,24,.95);
        border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;backdrop-filter:blur(10px)}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;text-decoration:none;margin-right:20px;flex-shrink:0}
    .nav-links{display:flex;gap:2px;align-items:center;flex:1}
    .nl{color:var(--dim);font-size:12px;padding:5px 10px;border-radius:6px;text-decoration:none;letter-spacing:.3px;white-space:nowrap;transition:color .15s,background .15s}
    .nl:hover,.nl.active{color:#fff;background:rgba(255,255,255,.06)}
    .nav-r{display:flex;align-items:center;gap:10px}
    .hamburger{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:4px}
    .hamburger span{display:block;width:20px;height:2px;background:var(--dim);border-radius:2px;transition:.2s}
    @media(max-width:768px){
      .hamburger{display:flex}
      .nav-links{display:none;position:absolute;top:52px;left:0;right:0;flex-direction:column;background:rgba(10,12,24,.98);
        border-bottom:1px solid var(--border);padding:8px 12px 12px;gap:2px;z-index:199}
      .nav-links.open{display:flex}
      .nav-r{display:none}
    }

    /* ── Hero ── */
    .hero{padding:24px 28px 18px;border-bottom:1px solid var(--border);
          background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,212,255,.06) 0%,transparent 70%)}
    .hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff}
    .hero-sub{font-size:12px;color:var(--dim);margin-top:4px}

    /* ── Filter tabs ── */
    .filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
    .f-btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.8px;padding:5px 14px;
           border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);
           cursor:pointer;transition:all .15s;white-space:nowrap}
    .f-btn:hover{color:#fff;border-color:rgba(255,255,255,.2)}
    .f-btn.active{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);color:var(--cyan)}

    /* ── Stats strip ── */
    .stats-strip{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
                 padding:10px 28px;border-bottom:1px solid var(--border);background:var(--bg2)}
    .s-chip{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);color:var(--dim)}
    .s-chip.green{background:rgba(46,204,113,.08);border-color:rgba(46,204,113,.25);color:var(--green)}
    .s-chip.red  {background:rgba(231,76,60,.08); border-color:rgba(231,76,60,.25); color:var(--red)}
    .s-chip.cyan {background:rgba(0,212,255,.08); border-color:rgba(0,212,255,.25); color:var(--cyan)}
    .s-sep{color:var(--border);font-size:16px}
    .s-source{font-size:10px;color:var(--muted);margin-left:auto}
    .refresh-btn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.8px;padding:4px 12px;
                 border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--dim);
                 cursor:pointer;transition:all .15s}
    .refresh-btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}

    /* ── Main grid ── */
    .movers-wrap{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
    @media(max-width:900px){.movers-wrap{grid-template-columns:1fr}}

    /* ── Panel ── */
    .panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .panel-head{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
    .panel-icon{font-size:16px}
    .panel-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px}
    .panel-head.gainers .panel-title{color:var(--green)}
    .panel-head.losers  .panel-title{color:var(--red)}
    .panel-count{font-size:10px;color:var(--muted);margin-left:auto}

    /* ── Table ── */
    .mv-table{width:100%;border-collapse:collapse}
    .mv-table th{font-size:9px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;
                 padding:8px 12px;text-align:right;background:var(--bg3);border-bottom:1px solid var(--border)}
    .mv-table th:first-child,.mv-table th:nth-child(2){text-align:left}
    .mv-table td{padding:9px 12px;font-size:12px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03)}
    .mv-table td:first-child,.mv-table td:nth-child(2){text-align:left}
    .mv-table tr:last-child td{border-bottom:none}
    .mv-table tr:hover td{background:rgba(255,255,255,.02)}

    /* ── Rank badge ── */
    .rank{display:inline-flex;align-items:center;justify-content:center;
          width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:600}
    .rank.top{background:rgba(46,204,113,.15);color:var(--green)}
    .rank.bot{background:rgba(231,76,60,.15);color:var(--red)}

    /* ── Symbol cell ── */
    .sym-cell{display:flex;flex-direction:column;gap:1px}
    .sym-name{font-weight:600;font-size:12px;color:#fff}
    .sym-meta{font-size:9px;color:var(--muted);letter-spacing:.3px}

    /* ── Change cells ── */
    .chg-pos{color:var(--green)}
    .chg-neg{color:var(--red)}
    .pct-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700}
    .pct-pos{background:rgba(46,204,113,.12);color:var(--green)}
    .pct-neg{background:rgba(231,76,60,.12); color:var(--red)}
    .pct-big-pos{background:rgba(46,204,113,.22);color:#2ecc71}
    .pct-big-neg{background:rgba(231,76,60,.22); color:#e74c3c}

    /* ── Day range bar ── */
    .range-wrap{position:relative;width:60px;height:4px;background:rgba(255,255,255,.08);
                border-radius:2px;display:inline-block;vertical-align:middle}
    .range-fill{position:absolute;top:0;bottom:0;background:rgba(255,255,255,.2);border-radius:2px}
    .range-dot{position:absolute;top:-3px;width:10px;height:10px;border-radius:50%;transform:translateX(-50%)}
    .range-dot.pos{background:var(--green);box-shadow:0 0 4px rgba(46,204,113,.5)}
    .range-dot.neg{background:var(--red);  box-shadow:0 0 4px rgba(231,76,60,.5)}

    /* ── Volume ── */
    .vol{color:var(--dim);font-size:11px}

    /* ── Loading / Error ── */
    .loading-state,.error-state{padding:40px;text-align:center;color:var(--muted);font-size:13px}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.1);
             border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── 52W bar ── */
    .yw-wrap{position:relative;width:50px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;display:inline-block;vertical-align:middle}
    .yw-dot{position:absolute;top:-2.5px;width:8px;height:8px;border-radius:50%;transform:translateX(-50%);background:var(--accent)}

    /* ── Indicator modal ── */
    .ind-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    @media(max-width:500px){.ind-grid{grid-template-columns:1fr 1fr}}
    .ind-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;transition:border-color .15s}
    .ind-card.ind-bull{border-color:rgba(46,204,113,.2)}
    .ind-card.ind-bear{border-color:rgba(231,76,60,.15)}
    .ind-label{font-size:10px;letter-spacing:.8px;color:var(--muted);margin-bottom:6px;
               display:flex;justify-content:space-between;align-items:center}
    .ind-tf{font-size:8px;background:rgba(255,255,255,.06);padding:2px 5px;border-radius:4px;color:var(--dim)}
    .ind-val{font-size:13px;font-weight:600;color:#fff}
    .ind-status{font-size:9px;letter-spacing:.5px;font-weight:700}
    .rsi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .rsi-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px}
    .rsi-bar-wrap{height:6px;border-radius:3px;background:rgba(255,255,255,.08);margin:8px 0 4px;position:relative;overflow:visible}
    .rsi-bar-fill{height:100%;border-radius:3px;position:absolute;top:0;left:0}
    .rsi-bar-mid{position:absolute;top:-2px;bottom:-2px;width:2px;left:50%;background:rgba(255,255,255,.2);border-radius:1px}
    .rsi-bar-dot{position:absolute;top:-3px;width:12px;height:12px;border-radius:50%;transform:translateX(-50%);border:2px solid #0f1225}
    .rsi-zone-badge{display:inline-block;font-size:9px;letter-spacing:.8px;font-weight:700;padding:2px 7px;border-radius:8px}

    /* ── Mode tabs ── */
    --r2:6px;
    .mode-tabs{display:flex;gap:4px;margin-top:14px}
    .mode-tab{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.6px;padding:6px 16px;
              border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);
              cursor:pointer;transition:all .15s}
    .mode-tab.active{background:rgba(124,106,247,.14);border-color:rgba(124,106,247,.4);color:#9585f9}

    /* ── Scanner controls ── */
    .ctrl-bar{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px;padding:14px 28px 12px;
              border-bottom:1px solid var(--border);background:var(--bg2)}
    .ctrl-group{display:flex;flex-direction:column;gap:5px}
    .ctrl-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase}
    .toggle-group{display:flex;gap:2px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r2);padding:2px}
    .tog-btn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.5px;padding:4px 10px;
             border-radius:4px;border:none;background:transparent;color:var(--dim);cursor:pointer;transition:all .15s;white-space:nowrap}
    .tog-btn.active{background:#7c6af7;color:#fff}
    .price-input{width:74px;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;
                 color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:5px 8px;outline:none}
    .price-input:focus{border-color:#7c6af7}
    .scan-btn{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;letter-spacing:.5px;padding:7px 18px;
              border-radius:var(--r2);border:1px solid rgba(124,106,247,.5);background:rgba(124,106,247,.14);
              color:#9585f9;cursor:pointer;transition:all .15s;align-self:flex-end}
    .scan-btn:hover{background:rgba(124,106,247,.28)}
    .scan-btn:disabled{opacity:.6;cursor:not-allowed}

    /* ── Scanner table ── */
    .sc-table{width:100%;border-collapse:collapse;font-size:12px}
    .sc-table th{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:1.2px;color:var(--muted);
                 text-transform:uppercase;padding:9px 12px;text-align:right;background:var(--bg3);border-bottom:1px solid var(--border)}
    .sc-table th:nth-child(-n+2){text-align:left}
    .sc-table td{padding:9px 12px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03)}
    .sc-table td:nth-child(-n+2){text-align:left}
    .sc-table tr:last-child td{border-bottom:none}
    .sc-table tr:hover td{background:rgba(255,255,255,.025);cursor:pointer}
    .sc-sym{font-weight:600;color:#fff}
    .sc-chg.up{color:var(--green)}.sc-chg.dn{color:var(--red)}.sc-chg.fl{color:var(--muted)}
    .dom-bar-wrap{display:flex;flex-direction:column;gap:2px}
    .dom-bar{display:flex;height:4px;border-radius:2px;overflow:hidden;width:60px;background:rgba(255,255,255,.08)}
    .dom-buy{background:var(--green)}.dom-sell{background:var(--red)}
    .dom-pcts{display:flex;gap:4px;font-size:9px}.dom-pcts .b{color:var(--green)}.dom-pcts .s{color:var(--red)}
    .dom-badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 6px;border-radius:4px}
    .dom-buyer{background:rgba(46,204,113,.12);color:var(--green);border:1px solid rgba(46,204,113,.25)}
    .dom-seller{background:rgba(231,76,60,.1);color:var(--red);border:1px solid rgba(231,76,60,.2)}
    .sc-analyse{padding:4px 12px;border-radius:4px;font-family:'Syne',sans-serif;font-size:10px;font-weight:700;
                cursor:pointer;border:1px solid rgba(124,106,247,.4);background:rgba(124,106,247,.1);
                color:#9585f9;transition:all .15s;white-space:nowrap}
    .sc-analyse:hover{background:rgba(124,106,247,.22)}

    /* ── Live price flash ── */
    @keyframes flashUp  {0%{background:rgba(46,204,113,.35)}100%{background:transparent}}
    @keyframes flashDown{0%{background:rgba(231,76,60,.35)} 100%{background:transparent}}
    .flash-up  {animation:flashUp   .6s ease-out}
    .flash-down{animation:flashDown .6s ease-out}
    .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);
              animation:pulseLive 1.4s ease-in-out infinite;margin-right:5px;vertical-align:middle}
    @keyframes pulseLive{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
  </style>

<script>
function toggleNav(){document.getElementById('navLinks').classList.toggle('open')}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('#navLinks .nl').forEach(a=>a.addEventListener('click',()=>
    document.getElementById('navLinks').classList.remove('open')));
});

const API = '/api';
let _currentIndex  = 'nifty50';
let _autoTimer     = null;
let _countdownTimer= null;
let _priceTimer    = null;
let _nextRefresh   = 0;
const REFRESH_SEC  = 30;
const PRICE_SEC    = 5;

// Row cache: symbol → row data (avoids embedding JSON in HTML attributes)
const _rowCache = {};

// ── Helpers ──────────────────────────────────────────────────────────────────

function _fmtPrice(n) {
  if (n == null) return '—';
  return '₹' + n.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function _fmtVol(v) {
  if (!v) return '—';
  if (v >= 1e7)  return (v/1e7).toFixed(2) + ' Cr';
  if (v >= 1e5)  return (v/1e5).toFixed(1) + ' L';
  if (v >= 1e3)  return (v/1e3).toFixed(0) + ' K';
  return v;
}

function _fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
}

function _pctClass(p) {
  if (p >= 3)  return 'pct-badge pct-big-pos';
  if (p >= 0)  return 'pct-badge pct-pos';
  if (p >= -3) return 'pct-badge pct-neg';
  return 'pct-badge pct-big-neg';
}

function _rangeBar(ltp, low, high, isGainer) {
  if (!low || !high || high === low) return '<span style="color:var(--muted)">—</span>';
  const pct = Math.max(0, Math.min(100, ((ltp - low) / (high - low)) * 100));
  return `<span class="range-wrap">
    <span class="range-fill" style="left:0;right:${100-pct}%"></span>
    <span class="range-dot ${isGainer?'pos':'neg'}" style="left:${pct}%"></span>
  </span>`;
}

function _ywBar(ltp, yl, yh) {
  if (!yl || !yh || yh === yl) return '';
  const pct = Math.max(0, Math.min(100, ((ltp - yl) / (yh - yl)) * 100));
  return `<span class="yw-wrap" title="52W: ₹${yl} – ₹${yh}">
    <span class="yw-dot" style="left:${pct}%"></span>
  </span>`;
}

// ── Render ───────────────────────────────────────────────────────────────────

function _renderRows(rows, isGainer) {
  return rows.map((r, i) => {
    _rowCache[r.symbol] = r;  // store for modal lookup
    const chgCls  = r.pct_change >= 0 ? 'chg-pos' : 'chg-neg';
    const sign    = r.pct_change >= 0 ? '+' : '';
    const chgSign = r.change >= 0 ? '+' : '';
    return `
    <tr data-sym="${r.symbol}" style="cursor:pointer" onclick="window.open('/stock-analyser.html?symbol=${encodeURIComponent(r.symbol)}','_blank')" title="Tap to analyse this stock">
      <td><span class="rank ${isGainer?'top':'bot'}">${i+1}</span></td>
      <td>
        <div class="sym-cell">
          <span class="sym-name">${r.symbol}</span>
          <span class="sym-meta">PREV ₹${r.prev_close}</span>
        </div>
      </td>
      <td style="color:var(--text);font-weight:600"><span class="ltp-val" data-ltp="${r.ltp}">${_fmtPrice(r.ltp)}</span></td>
      <td class="${chgCls}">${chgSign}${r.change != null ? r.change.toFixed(2) : '—'}</td>
      <td><span class="${_pctClass(r.pct_change)}">${sign}${r.pct_change.toFixed(2)}%</span></td>
      <td>${_rangeBar(r.ltp, r.low, r.high, isGainer)}</td>
      <td class="vol">${_fmtVol(r.volume)}</td>
      ${r.year_high ? `<td>${_ywBar(r.ltp, r.year_low, r.year_high)}</td>` : '<td></td>'}
    </tr>`;
  }).join('');
}

function _renderPanel(rows, isGainer) {
  const headCls   = isGainer ? 'gainers' : 'losers';
  const icon      = isGainer ? '🚀' : '📉';
  const title     = isGainer ? 'TOP 10 GAINERS' : 'TOP 10 LOSERS';
  const hasYW     = rows.some(r => r.year_high);
  return `
  <div class="panel">
    <div class="panel-head ${headCls}">
      <span class="panel-icon">${icon}</span>
      <span class="panel-title">${title}</span>
      <span class="panel-count">${rows.length} stocks</span>
    </div>
    <div style="overflow-x:auto">
    <table class="mv-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Symbol</th>
          <th>LTP</th>
          <th>Chg ₹</th>
          <th>Chg %</th>
          <th>Day Range</th>
          <th>Volume</th>
          ${hasYW ? '<th>52W</th>' : '<th></th>'}
        </tr>
      </thead>
      <tbody>${_renderRows(rows, isGainer)}</tbody>
    </table>
    </div>
  </div>`;
}

function _renderData(d) {
  // Stats strip
  document.getElementById('chipTotal').textContent = `${d.count} stocks`;
  document.getElementById('chipAdv').textContent   = `▲ ${d.advancing} advancing`;
  document.getElementById('chipDec').textContent   = `▼ ${d.declining} declining`;
  document.getElementById('chipUnch').textContent  = `${d.unchanged} unchanged`;
  document.getElementById('chipTime').textContent  = `Updated ${_fmtTime(d.fetched_at)}`;
  document.getElementById('chipSourceTxt').textContent = d.source;
  document.getElementById('liveDot').style.display = d.source === 'NSE Live' ? 'inline-block' : 'none';
  const lastBadge = document.getElementById('lastUpdateBadge');
  if (lastBadge) lastBadge.textContent = d.index;

  // A/D ratio colour
  const ratio = d.advancing / (d.declining || 1);
  document.getElementById('chipAdv').className = `s-chip ${ratio >= 1 ? 'green' : 'red'}`;

  // Panels
  document.getElementById('moversWrap').innerHTML =
    _renderPanel(d.gainers, true) + _renderPanel(d.losers, false);
}

// ── Fetch ────────────────────────────────────────────────────────────────────

async function loadMovers(index, btn) {
  _currentIndex = index;
  _resetCountdown();
  _startPricePoll();

  // Update active button (btn is undefined on auto-refresh — find by index)
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = btn || document.querySelector(`.f-btn[onclick*="'${index}'"]`);
  if (activeBtn) activeBtn.classList.add('active');

  document.getElementById('moversWrap').innerHTML =
    '<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><br>Fetching data…</div>';

  try {
    const d = await fetch(`${API}/stocks/movers?index=${index}`).then(r => r.json());
    if (d.error) {
      document.getElementById('moversWrap').innerHTML =
        `<div class="error-state" style="grid-column:1/-1">⚠ ${d.error}</div>`;
      return;
    }
    _renderData(d);
  } catch(e) {
    document.getElementById('moversWrap').innerHTML =
      `<div class="error-state" style="grid-column:1/-1">Failed to load: ${e.message}</div>`;
  }
}

function refresh() {
  _resetCountdown();
  loadMovers(_currentIndex, document.querySelector('.f-btn.active'));
}

function _resetCountdown() {
  _nextRefresh = Date.now() + REFRESH_SEC * 1000;
}

function _startCountdown() {
  if (_countdownTimer) clearInterval(_countdownTimer);
  _resetCountdown();
  _countdownTimer = setInterval(() => {
    const secs = Math.max(0, Math.round((_nextRefresh - Date.now()) / 1000));
    const el   = document.getElementById('countdownBadge');
    if (el) el.textContent = secs > 0 ? `↻ ${secs}s` : '';
    if (secs === 0) {
      _resetCountdown();
      loadMovers(_currentIndex);
    }
  }, 1000);
}




// ── Live price polling ────────────────────────────────────────────────────────

function _updateLtp(sym, newLtp) {
  const row = document.querySelector(`tr[data-sym="${sym}"]`);
  if (!row) return;
  const cell = row.querySelector('.ltp-val');
  if (!cell) return;
  const oldLtp = parseFloat(cell.dataset.ltp || '0');
  if (newLtp === oldLtp) return;
  cell.dataset.ltp = newLtp;
  cell.textContent = _fmtPrice(newLtp);
  // Flash green if price went up, red if down
  cell.classList.remove('flash-up', 'flash-down');
  void cell.offsetWidth; // force reflow to restart animation
  cell.classList.add(newLtp > oldLtp ? 'flash-up' : 'flash-down');
  if (_rowCache[sym]) _rowCache[sym].ltp = newLtp;
}

async function _pollPrices() {
  if (!document.querySelector('tr[data-sym]')) return; // table not rendered yet
  try {
    const d = await fetch(`${API}/stocks/live-prices?index=${_currentIndex}`).then(r => r.json());
    if (d.prices) {
      Object.entries(d.prices).forEach(([sym, info]) => {
        const ltp = typeof info === 'object' ? info.ltp : info;
        if (ltp != null) _updateLtp(sym, ltp);
      });
      // Update source indicator
      if (d.source) {
        document.getElementById('chipSourceTxt').textContent = d.source;
        document.getElementById('liveDot').style.display = d.source === 'NSE Live' ? 'inline-block' : 'none';
      }
    }
  } catch (_) {}  // silent fail — stale data is fine
}

function _startPricePoll() {
  if (_priceTimer) clearInterval(_priceTimer);
  _priceTimer = setInterval(_pollPrices, PRICE_SEC * 1000);
}

// Init
loadMovers('nifty50', document.querySelector('.f-btn.active'));
_startCountdown();
_startPricePoll();

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="halo-aurora.js"></script>
