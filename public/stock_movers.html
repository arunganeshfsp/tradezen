<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Market Movers — TradeZen</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;min-height:100vh}

    /* ── Nav ── */
    nav{display:flex;align-items:center;gap:0;padding:0 24px;height:52px;background:rgba(10,12,24,.95);
        border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;backdrop-filter:blur(10px)}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:#fff;text-decoration:none;margin-right:20px;flex-shrink:0}
    .nav-links{display:flex;gap:2px;align-items:center;flex:1}
    .nl{color:var(--dim);font-size:12px;padding:5px 10px;border-radius:6px;text-decoration:none;letter-spacing:.3px;white-space:nowrap;transition:color .15s,background .15s}
    .nl:hover,.nl.active{color:#fff;background:rgba(255,255,255,.06)}
    .nav-r{display:flex;align-items:center;gap:10px}
    .hamburger{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer;padding:4px}
    .hamburger span{display:block;width:20px;height:2px;background:var(--dim);border-radius:2px;transition:.2s}
    @media(max-width:768px){
      .hamburger{display:flex}
      .nav-links{display:none;position:absolute;top:52px;left:0;right:0;flex-direction:column;background:rgba(10,12,24,.98);
        border-bottom:1px solid var(--border);padding:8px 12px 12px;gap:2px;z-index:199}
      .nav-links.open{display:flex}
      .nav-r{display:none}
    }

    /* ── Hero ── */
    .hero{padding:24px 28px 18px;border-bottom:1px solid var(--border);
          background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,212,255,.06) 0%,transparent 70%)}
    .hero-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff}
    .hero-sub{font-size:12px;color:var(--dim);margin-top:4px}

    /* ── Filter tabs ── */
    .filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px}
    .f-btn{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.8px;padding:5px 14px;
           border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);
           cursor:pointer;transition:all .15s;white-space:nowrap}
    .f-btn:hover{color:#fff;border-color:rgba(255,255,255,.2)}
    .f-btn.active{background:rgba(0,212,255,.12);border-color:rgba(0,212,255,.4);color:var(--cyan)}

    /* ── Stats strip ── */
    .stats-strip{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
                 padding:10px 28px;border-bottom:1px solid var(--border);background:var(--bg2)}
    .s-chip{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid var(--border);color:var(--dim)}
    .s-chip.green{background:rgba(46,204,113,.08);border-color:rgba(46,204,113,.25);color:var(--green)}
    .s-chip.red  {background:rgba(231,76,60,.08); border-color:rgba(231,76,60,.25); color:var(--red)}
    .s-chip.cyan {background:rgba(0,212,255,.08); border-color:rgba(0,212,255,.25); color:var(--cyan)}
    .s-sep{color:var(--border);font-size:16px}
    .s-source{font-size:10px;color:var(--muted);margin-left:auto}
    .refresh-btn{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.8px;padding:4px 12px;
                 border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--dim);
                 cursor:pointer;transition:all .15s}
    .refresh-btn:hover{color:#fff;border-color:rgba(255,255,255,.3)}

    /* ── Main grid ── */
    .movers-wrap{padding:20px 28px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
    @media(max-width:900px){.movers-wrap{grid-template-columns:1fr}}

    /* ── Panel ── */
    .panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
    .panel-head{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border)}
    .panel-icon{font-size:16px}
    .panel-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;letter-spacing:.5px}
    .panel-head.gainers .panel-title{color:var(--green)}
    .panel-head.losers  .panel-title{color:var(--red)}
    .panel-count{font-size:10px;color:var(--muted);margin-left:auto}

    /* ── Table ── */
    .mv-table{width:100%;border-collapse:collapse}
    .mv-table th{font-size:9px;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase;
                 padding:8px 12px;text-align:right;background:var(--bg3);border-bottom:1px solid var(--border)}
    .mv-table th:first-child,.mv-table th:nth-child(2){text-align:left}
    .mv-table td{padding:9px 12px;font-size:12px;text-align:right;border-bottom:1px solid rgba(255,255,255,.03)}
    .mv-table td:first-child,.mv-table td:nth-child(2){text-align:left}
    .mv-table tr:last-child td{border-bottom:none}
    .mv-table tr:hover td{background:rgba(255,255,255,.02)}

    /* ── Rank badge ── */
    .rank{display:inline-flex;align-items:center;justify-content:center;
          width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:600}
    .rank.top{background:rgba(46,204,113,.15);color:var(--green)}
    .rank.bot{background:rgba(231,76,60,.15);color:var(--red)}

    /* ── Symbol cell ── */
    .sym-cell{display:flex;flex-direction:column;gap:1px}
    .sym-name{font-weight:600;font-size:12px;color:#fff}
    .sym-meta{font-size:9px;color:var(--muted);letter-spacing:.3px}

    /* ── Change cells ── */
    .chg-pos{color:var(--green)}
    .chg-neg{color:var(--red)}
    .pct-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;font-weight:700}
    .pct-pos{background:rgba(46,204,113,.12);color:var(--green)}
    .pct-neg{background:rgba(231,76,60,.12); color:var(--red)}
    .pct-big-pos{background:rgba(46,204,113,.22);color:#2ecc71}
    .pct-big-neg{background:rgba(231,76,60,.22); color:#e74c3c}

    /* ── Day range bar ── */
    .range-wrap{position:relative;width:60px;height:4px;background:rgba(255,255,255,.08);
                border-radius:2px;display:inline-block;vertical-align:middle}
    .range-fill{position:absolute;top:0;bottom:0;background:rgba(255,255,255,.2);border-radius:2px}
    .range-dot{position:absolute;top:-3px;width:10px;height:10px;border-radius:50%;transform:translateX(-50%)}
    .range-dot.pos{background:var(--green);box-shadow:0 0 4px rgba(46,204,113,.5)}
    .range-dot.neg{background:var(--red);  box-shadow:0 0 4px rgba(231,76,60,.5)}

    /* ── Volume ── */
    .vol{color:var(--dim);font-size:11px}

    /* ── Loading / Error ── */
    .loading-state,.error-state{padding:40px;text-align:center;color:var(--muted);font-size:13px}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,.1);
             border-top-color:var(--cyan);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:8px}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── 52W bar ── */
    .yw-wrap{position:relative;width:50px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;display:inline-block;vertical-align:middle}
    .yw-dot{position:absolute;top:-2.5px;width:8px;height:8px;border-radius:50%;transform:translateX(-50%);background:var(--accent)}
  </style>
  <link rel="stylesheet" href="theme.css"><script src="theme.js"></script>
</head>
<body>

<!-- ── Nav ── -->
<nav id="mainNav">
  <a class="nav-logo" href="index.html">TradeZen</a>
  <div class="nav-links" id="navLinks">
    <a class="nl" href="trade_flow.html">Trade Flow</a>
    <a class="nl" href="fno_scanner.html">F&amp;O Scanner</a>
    <a class="nl" href="stock_options.html">Stock Options</a>
    <a class="nl" href="index_options.html">Index Options</a>
    <a class="nl active" href="stock_movers.html">Movers</a>
    <a class="nl" href="market_psychology.html">TradeFun</a>
    <a class="nl" href="cpr_monitor.html">CPR Monitor</a>
    <a class="nl" href="index.html">⌂ Home</a>
  </div>
  <div class="nav-r">
    <span id="lastUpdateBadge" style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--muted)">MARKET MOVERS</span>
  </div>
  <button id="themeToggle" onclick="toggleTheme()" title="Toggle theme"
    style="background:none;border:1px solid var(--border);border-radius:6px;width:30px;height:30px;
           cursor:pointer;font-size:14px;color:var(--dim);transition:border-color .15s;padding:0;flex-shrink:0;margin-left:10px"></button>
  <button class="hamburger" onclick="toggleNav()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ── Hero ── -->
<div class="hero">
  <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
    <div>
      <div class="hero-title">Market Movers</div>
      <div class="hero-sub">Top &amp; Bottom 10 stocks of the day — Nifty 50, 500, Bank, IT and more</div>
      <div class="filter-bar">
        <button class="f-btn active" onclick="loadMovers('nifty50',this)">NIFTY 50</button>
        <button class="f-btn" onclick="loadMovers('nifty500',this)">NIFTY 500</button>
        <button class="f-btn" onclick="loadMovers('banknifty',this)">BANK NIFTY</button>
        <button class="f-btn" onclick="loadMovers('niftyit',this)">NIFTY IT</button>
        <button class="f-btn" onclick="loadMovers('midcap100',this)">MIDCAP 100</button>
        <button class="f-btn" onclick="loadMovers('smallcap',this)">SMALLCAP 100</button>
      </div>
    </div>
  </div>
</div>

<!-- ── Stats strip ── -->
<div class="stats-strip" id="statsStrip">
  <span class="s-chip" id="chipTotal">— stocks</span>
  <span class="s-sep">|</span>
  <span class="s-chip green" id="chipAdv">▲ — advancing</span>
  <span class="s-chip red"   id="chipDec">▼ — declining</span>
  <span class="s-chip"       id="chipUnch">— unchanged</span>
  <span class="s-sep">|</span>
  <span class="s-chip cyan"  id="chipTime">Loading…</span>
  <span class="s-source"     id="chipSource"></span>
  <button class="refresh-btn" onclick="refresh()">↻ Refresh</button>
</div>

<!-- ── Main content ── -->
<div class="movers-wrap" id="moversWrap">
  <div class="loading-state" style="grid-column:1/-1">
    <div class="spinner"></div><br>Fetching market data…
  </div>
</div>

<script>
function toggleNav(){document.getElementById('navLinks').classList.toggle('open')}
document.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('#navLinks .nl').forEach(a=>a.addEventListener('click',()=>
    document.getElementById('navLinks').classList.remove('open')));
});

const API = '/api';
let _currentIndex = 'nifty50';
let _autoTimer = null;

// ── Helpers ──────────────────────────────────────────────────────────────────

function _fmtPrice(n) {
  if (n == null) return '—';
  return '₹' + n.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}

function _fmtVol(v) {
  if (!v) return '—';
  if (v >= 1e7)  return (v/1e7).toFixed(2) + ' Cr';
  if (v >= 1e5)  return (v/1e5).toFixed(1) + ' L';
  if (v >= 1e3)  return (v/1e3).toFixed(0) + ' K';
  return v;
}

function _fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
}

function _pctClass(p) {
  if (p >= 3)  return 'pct-badge pct-big-pos';
  if (p >= 0)  return 'pct-badge pct-pos';
  if (p >= -3) return 'pct-badge pct-neg';
  return 'pct-badge pct-big-neg';
}

function _rangeBar(ltp, low, high, isGainer) {
  if (!low || !high || high === low) return '<span style="color:var(--muted)">—</span>';
  const pct = Math.max(0, Math.min(100, ((ltp - low) / (high - low)) * 100));
  return `<span class="range-wrap">
    <span class="range-fill" style="left:0;right:${100-pct}%"></span>
    <span class="range-dot ${isGainer?'pos':'neg'}" style="left:${pct}%"></span>
  </span>`;
}

function _ywBar(ltp, yl, yh) {
  if (!yl || !yh || yh === yl) return '';
  const pct = Math.max(0, Math.min(100, ((ltp - yl) / (yh - yl)) * 100));
  return `<span class="yw-wrap" title="52W: ₹${yl} – ₹${yh}">
    <span class="yw-dot" style="left:${pct}%"></span>
  </span>`;
}

// ── Render ───────────────────────────────────────────────────────────────────

function _renderRows(rows, isGainer) {
  return rows.map((r, i) => {
    const chgCls  = r.pct_change >= 0 ? 'chg-pos' : 'chg-neg';
    const sign    = r.pct_change >= 0 ? '+' : '';
    const chgSign = r.change >= 0 ? '+' : '';
    return `
    <tr>
      <td><span class="rank ${isGainer?'top':'bot'}">${i+1}</span></td>
      <td>
        <div class="sym-cell">
          <span class="sym-name">${r.symbol}</span>
          <span class="sym-meta">PREV ₹${r.prev_close}</span>
        </div>
      </td>
      <td style="color:#fff;font-weight:600">${_fmtPrice(r.ltp)}</td>
      <td class="${chgCls}">${chgSign}${r.change != null ? r.change.toFixed(2) : '—'}</td>
      <td><span class="${_pctClass(r.pct_change)}">${sign}${r.pct_change.toFixed(2)}%</span></td>
      <td>${_rangeBar(r.ltp, r.low, r.high, isGainer)}</td>
      <td class="vol">${_fmtVol(r.volume)}</td>
      ${r.year_high ? `<td>${_ywBar(r.ltp, r.year_low, r.year_high)}</td>` : '<td></td>'}
    </tr>`;
  }).join('');
}

function _renderPanel(rows, isGainer) {
  const headCls   = isGainer ? 'gainers' : 'losers';
  const icon      = isGainer ? '🚀' : '📉';
  const title     = isGainer ? 'TOP 10 GAINERS' : 'TOP 10 LOSERS';
  const hasYW     = rows.some(r => r.year_high);
  return `
  <div class="panel">
    <div class="panel-head ${headCls}">
      <span class="panel-icon">${icon}</span>
      <span class="panel-title">${title}</span>
      <span class="panel-count">${rows.length} stocks</span>
    </div>
    <table class="mv-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Symbol</th>
          <th>LTP</th>
          <th>Chg ₹</th>
          <th>Chg %</th>
          <th>Day Range</th>
          <th>Volume</th>
          ${hasYW ? '<th>52W</th>' : '<th></th>'}
        </tr>
      </thead>
      <tbody>${_renderRows(rows, isGainer)}</tbody>
    </table>
  </div>`;
}

function _renderData(d) {
  // Stats strip
  document.getElementById('chipTotal').textContent = `${d.count} stocks`;
  document.getElementById('chipAdv').textContent   = `▲ ${d.advancing} advancing`;
  document.getElementById('chipDec').textContent   = `▼ ${d.declining} declining`;
  document.getElementById('chipUnch').textContent  = `${d.unchanged} unchanged`;
  document.getElementById('chipTime').textContent  = `Updated ${_fmtTime(d.fetched_at)}`;
  document.getElementById('chipSource').textContent= d.source;
  document.getElementById('lastUpdateBadge').textContent = d.index;

  // A/D ratio colour
  const ratio = d.advancing / (d.declining || 1);
  document.getElementById('chipAdv').className = `s-chip ${ratio >= 1 ? 'green' : 'red'}`;

  // Panels
  document.getElementById('moversWrap').innerHTML =
    _renderPanel(d.gainers, true) + _renderPanel(d.losers, false);
}

// ── Fetch ────────────────────────────────────────────────────────────────────

async function loadMovers(index, btn) {
  _currentIndex = index;

  // Update active button
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  document.getElementById('moversWrap').innerHTML =
    '<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><br>Fetching data…</div>';

  try {
    const d = await fetch(`${API}/stocks/movers?index=${index}`).then(r => r.json());
    if (d.error) {
      document.getElementById('moversWrap').innerHTML =
        `<div class="error-state" style="grid-column:1/-1">⚠ ${d.error}</div>`;
      return;
    }
    _renderData(d);
  } catch(e) {
    document.getElementById('moversWrap').innerHTML =
      `<div class="error-state" style="grid-column:1/-1">Failed to load: ${e.message}</div>`;
  }
}

function refresh() {
  loadMovers(_currentIndex, document.querySelector('.f-btn.active'));
}

// Auto-refresh every 5 min
function startAutoRefresh() {
  _autoTimer = setInterval(() => loadMovers(_currentIndex), 300000);
}

// Init
loadMovers('nifty50', document.querySelector('.f-btn.active'));
startAutoRefresh();
</script>
</body>
</html>
