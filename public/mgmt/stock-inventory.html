<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Universe Inventory — TradeZen</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surf:#161b22;--surf2:#21262d;--bdr:#30363d;--txt:#e6edf3;--muted:#8b949e;
  --accent:#58a6ff;--gain:#3fb950;--warn:#d29922;--danger:#f85149;}
body{background:var(--bg);color:var(--txt);font-size:13px;}
.topbar{background:var(--surf);border-bottom:1px solid var(--bdr);height:52px;}
.count-badge{background:var(--surf2);border:1px solid var(--bdr);border-radius:6px;
  padding:3px 10px;font-size:12px;color:var(--txt);}
.count-badge .num{font-size:15px;font-weight:600;color:var(--accent);}
.count-badge.both .num{color:var(--warn);}
.nav-tabs .nav-link{color:var(--muted);border-color:transparent;font-size:13px;}
.nav-tabs .nav-link.active{color:var(--accent);background:transparent;border-bottom-color:var(--accent);}
.import-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sym-grid{display:flex;flex-wrap:wrap;gap:5px;max-height:calc(100vh - 280px);overflow-y:auto;
  padding:4px 0;}
.sym-chip{background:var(--surf2);border:1px solid var(--bdr);border-radius:4px;
  padding:2px 8px;font-size:11px;color:var(--txt);font-family:monospace;}
.sym-chip.in-both{border-color:var(--warn);color:var(--warn);}
.empty-msg{color:var(--muted);font-size:12px;padding:2rem 0;}
.form-control,.form-select{background:var(--bg);border-color:var(--bdr);color:var(--txt);font-size:12px;}
.form-control:focus,.form-select:focus{background:var(--bg);border-color:var(--accent);color:var(--txt);box-shadow:none;}
.status-msg{font-size:12px;padding:4px 10px;border-radius:4px;display:none;}
.status-msg.ok{background:rgba(63,185,80,.15);color:var(--gain);}
.status-msg.err{background:rgba(248,81,73,.15);color:var(--danger);}
#toast-area{position:fixed;bottom:1rem;right:1rem;z-index:9999;}
.toast{font-size:12px;}
</style>
</head>
<body>

<nav class="navbar topbar px-3 py-0 d-flex align-items-center justify-content-between">
  <span class="navbar-brand mb-0 fw-semibold" style="font-size:15px;">Stock Universe Inventory</span>
  <div class="d-flex align-items-center gap-2">
    <div class="count-badge">Nifty 500 <span class="num" id="cnt500">—</span></div>
    <div class="count-badge">F&amp;O <span class="num" id="cntFno">—</span></div>
    <div class="count-badge both">In Both <span class="num" id="cntBoth">—</span></div>
    <button class="btn btn-sm btn-outline-secondary ms-2" onclick="loadAll()">&#8635; Refresh</button>
    <a href="/mgmt/learn-admin.html" class="btn btn-sm btn-outline-secondary">Admin</a>
  </div>
</nav>

<div class="container-fluid" style="max-width:1200px;padding:1.25rem 1rem 0;">

  <ul class="nav nav-tabs mb-3" id="tabNav">
    <li class="nav-item">
      <button class="nav-link active" id="tab500" onclick="switchTab('nifty500')">Nifty 500</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" id="tabFno" onclick="switchTab('fno')">F&amp;O Stocks</button>
    </li>
  </ul>

  <!-- Nifty 500 Panel -->
  <div id="panel500">
    <div class="import-bar mb-3">
      <input type="file" id="file500" class="form-control" style="max-width:300px;" accept=".csv,.xlsx,.xls">
      <button class="btn btn-sm btn-primary" onclick="doImport('nifty500')">Import &amp; Replace</button>
      <button class="btn btn-sm btn-outline-danger" onclick="doClear('nifty500')">Clear All</button>
      <span id="status500" class="status-msg"></span>
    </div>
    <div class="d-flex align-items-center gap-2 mb-2">
      <input type="text" id="search500" class="form-control form-control-sm" style="max-width:240px;"
             placeholder="Search symbols…" oninput="filterChips('500')">
      <span class="text-muted" id="shown500" style="font-size:11px;"></span>
    </div>
    <div class="sym-grid" id="grid500">
      <div class="empty-msg">No Nifty 500 symbols loaded. Import a CSV file above.</div>
    </div>
  </div>

  <!-- F&O Panel -->
  <div id="panelFno" style="display:none;">
    <div class="import-bar mb-3">
      <input type="file" id="fileFno" class="form-control" style="max-width:300px;" accept=".csv,.xlsx,.xls">
      <button class="btn btn-sm btn-primary" onclick="doImport('fno')">Import &amp; Replace</button>
      <button class="btn btn-sm btn-outline-danger" onclick="doClear('fno')">Clear All</button>
      <span id="statusFno" class="status-msg"></span>
    </div>
    <div class="d-flex align-items-center gap-2 mb-2">
      <input type="text" id="searchFno" class="form-control form-control-sm" style="max-width:240px;"
             placeholder="Search symbols…" oninput="filterChips('Fno')">
      <span class="text-muted" id="shownFno" style="font-size:11px;"></span>
    </div>
    <div class="sym-grid" id="gridFno">
      <div class="empty-msg">No F&amp;O symbols loaded. Import an Excel file above.</div>
    </div>
  </div>

  <div class="text-muted mt-4" style="font-size:11px;border-top:1px solid var(--bdr);padding-top:10px;">
    For educational purposes only. Not investment advice. Consult a SEBI-registered adviser before trading.
  </div>
</div>

<div id="toast-area"></div>

<script>
const API = '/api';
let _n500 = [], _fno = [], _bothSet = new Set();
let _activeTab = 'nifty500';

async function loadAll() {
  try {
    const r = await fetch(`${API}/stock-inventory`);
    const d = await r.json();
    if (d.error) { toast(d.error, 'danger'); return; }
    _n500   = d.nifty500 || [];
    _fno    = d.fno      || [];
    _bothSet = new Set(_n500.filter(s => _fno.includes(s)));
    const c = d.counts || {};
    document.getElementById('cnt500').textContent  = c.nifty500 ?? '0';
    document.getElementById('cntFno').textContent  = c.fno      ?? '0';
    document.getElementById('cntBoth').textContent = c.both     ?? '0';
    renderGrid('500', _n500);
    renderGrid('Fno', _fno);
  } catch (e) {
    toast('Failed to load inventory: ' + e.message, 'danger');
  }
}

function renderGrid(key, symbols) {
  const grid = document.getElementById('grid' + key);
  const search = (document.getElementById('search' + key)?.value || '').toUpperCase();
  const filtered = search ? symbols.filter(s => s.includes(search)) : symbols;
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty-msg">${symbols.length ? 'No matches for "' + search + '"' : 'No symbols loaded.'}</div>`;
    const shown = document.getElementById('shown' + key);
    if (shown) shown.textContent = '';
    return;
  }
  grid.innerHTML = filtered.map(s => {
    const cls = _bothSet.has(s) ? 'sym-chip in-both' : 'sym-chip';
    return `<span class="${cls}" title="${_bothSet.has(s) ? 'In both Nifty 500 & F&O' : ''}">${s}</span>`;
  }).join('');
  const shown = document.getElementById('shown' + key);
  if (shown) shown.textContent = `${filtered.length} / ${symbols.length}`;
}

function filterChips(key) {
  renderGrid(key, key === '500' ? _n500 : _fno);
}

function switchTab(tab) {
  _activeTab = tab;
  document.getElementById('panel500').style.display  = tab === 'nifty500' ? '' : 'none';
  document.getElementById('panelFno').style.display  = tab === 'fno'      ? '' : 'none';
  document.getElementById('tab500').classList.toggle('active', tab === 'nifty500');
  document.getElementById('tabFno').classList.toggle('active', tab === 'fno');
}

async function doImport(source) {
  const fileId  = source === 'nifty500' ? 'file500' : 'fileFno';
  const statusId = source === 'nifty500' ? 'status500' : 'statusFno';
  const input   = document.getElementById(fileId);
  const status  = document.getElementById(statusId);
  if (!input.files.length) { showStatus(status, 'Please select a file first.', false); return; }
  showStatus(status, 'Importing…', null);
  const fd = new FormData();
  fd.append('file', input.files[0]);
  try {
    const r  = await fetch(`${API}/stock-inventory/import?source=${source}`, { method: 'POST', body: fd });
    const d  = await r.json();
    if (!r.ok || d.error) { showStatus(status, d.error || 'Import failed', false); return; }
    showStatus(status, `Imported ${d.imported} symbols.`, true);
    input.value = '';
    loadAll();
  } catch (e) {
    showStatus(status, e.message, false);
  }
}

async function doClear(source) {
  if (!confirm(`Clear all ${source === 'nifty500' ? 'Nifty 500' : 'F&O'} symbols? This cannot be undone.`)) return;
  const statusId = source === 'nifty500' ? 'status500' : 'statusFno';
  const status   = document.getElementById(statusId);
  try {
    const r = await fetch(`${API}/stock-inventory?source=${source}`, { method: 'DELETE' });
    const d = await r.json();
    if (!r.ok || d.error) { showStatus(status, d.error || 'Clear failed', false); return; }
    showStatus(status, `Cleared ${d.deleted} symbols.`, true);
    loadAll();
  } catch (e) {
    showStatus(status, e.message, false);
  }
}

function showStatus(el, msg, ok) {
  el.textContent = msg;
  el.className   = 'status-msg ' + (ok === true ? 'ok' : ok === false ? 'err' : '');
  el.style.display = 'inline-block';
  if (ok !== null) setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function toast(msg, type = 'secondary') {
  const area = document.getElementById('toast-area');
  const el   = document.createElement('div');
  el.className = `toast align-items-center text-bg-${type} border-0 show mb-1`;
  el.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="this.closest('.toast').remove()"></button></div>`;
  area.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

loadAll();
</script>
</body>
</html>
