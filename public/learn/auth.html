<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — TradeZen Learn</title>
<link rel="stylesheet" href="/halo-aurora/css/halo-tokens.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<style>
  body {
    min-height: 100vh;
    background: var(--tz-bg);
    color: var(--tz-fg-1);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: var(--tz-font-ui);
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(50% 40% at 20% 20%, rgba(124,106,247,0.18) 0%, transparent 60%),
      radial-gradient(50% 40% at 80% 80%, rgba(91,138,245,0.15) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }
  .auth-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
  }
  .brand {
    text-align: center;
    margin-bottom: 28px;
  }
  .brand .wordmark {
    font-family: var(--tz-font-display);
    font-size: 24px;
    letter-spacing: -0.02em;
    color: var(--tz-fg-1);
    font-weight: 400;
  }
  .brand .wordmark em {
    font-style: italic;
    background: var(--tz-grad-h);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .brand .sub {
    font-family: var(--tz-font-mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--tz-fg-3);
    margin-top: 4px;
  }
  .card-box {
    background: var(--tz-surface);
    border: 1px solid var(--tz-border);
    border-radius: 20px;
    padding: 32px;
  }
  .tab-row {
    display: flex;
    gap: 0;
    background: var(--tz-bg);
    border: 1px solid var(--tz-border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 28px;
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 8px;
    font-family: var(--tz-font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--tz-fg-3);
    border-radius: 8px;
    cursor: pointer;
    transition: background 150ms, color 150ms;
  }
  .tab-btn.active {
    background: var(--tz-surface);
    color: var(--tz-fg-1);
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-family: var(--tz-font-mono);
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--tz-fg-3);
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    background: var(--tz-bg);
    border: 1px solid var(--tz-border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: var(--tz-font-ui);
    font-size: 14px;
    color: var(--tz-fg-1);
    outline: none;
    transition: border-color 150ms;
    box-sizing: border-box;
  }
  .form-group input:focus {
    border-color: var(--tz-accent-1);
  }
  .form-group input::placeholder { color: var(--tz-fg-3); }
  .btn-primary-tz {
    width: 100%;
    padding: 12px;
    background: var(--tz-accent-1);
    border: none;
    border-radius: 10px;
    font-family: var(--tz-font-ui);
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 150ms, transform 80ms;
  }
  .btn-primary-tz:hover   { opacity: 0.88; }
  .btn-primary-tz:active  { transform: scale(0.98); }
  .btn-primary-tz:disabled { opacity: 0.45; cursor: not-allowed; }
  .err-msg {
    display: none;
    margin-top: 12px;
    padding: 10px 14px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    font-size: 13px;
    color: #f87171;
  }
  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--tz-fg-3);
  }
</style>
</head>
<body>
<div class="auth-wrap">

  <div class="brand">
    <div class="wordmark">Trade<em>Zen</em></div>
    <div class="sub">Learn — Sign in to continue</div>
  </div>

  <div class="card-box">
    <div class="tab-row">
      <button class="tab-btn active" id="tab-login"  onclick="showTab('login')">Sign In</button>
      <button class="tab-btn"        id="tab-signup" onclick="showTab('signup')">Create Account</button>
    </div>

    <!-- Login -->
    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button class="btn-primary-tz" id="btn-login" type="submit">Sign In</button>
      <div class="err-msg" id="login-err"></div>
    </form>

    <!-- Signup -->
    <form id="form-signup" style="display:none;" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Display Name</label>
        <input type="text" id="s-name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="s-email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--tz-fg-3);font-size:10px;">(min 6 characters)</span></label>
        <input type="password" id="s-pass" placeholder="••••••••" required autocomplete="new-password" minlength="6">
      </div>
      <button class="btn-primary-tz" id="btn-signup" type="submit">Create Account</button>
      <div class="err-msg" id="signup-err"></div>
    </form>
  </div>

  <div class="footer-note">
    By continuing you agree to learn and grow 📈
  </div>
</div>

<script>
  const params   = new URLSearchParams(location.search);
  const nextUrl  = params.get('next') || '/learn/index.html';

  // If already logged in, skip auth
  (function() {
    const t = localStorage.getItem('tz_learn_token');
    if (t) location.replace(nextUrl);
  })();

  function showTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-signup').classList.toggle('active', !isLogin);
    document.getElementById('form-login').style.display  = isLogin ? '' : 'none';
    document.getElementById('form-signup').style.display = isLogin ? 'none' : '';
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearErr(id) { document.getElementById(id).style.display = 'none'; }

  async function handleLogin(e) {
    e.preventDefault();
    clearErr('login-err');
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('l-email').value.trim(),
          password: document.getElementById('l-pass').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) { showErr('login-err', data.error); return; }
      saveAndRedirect(data.token, data.user);
    } catch {
      showErr('login-err', 'Network error — please try again');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  async function handleSignup(e) {
    e.preventDefault();
    clearErr('signup-err');
    const btn = document.getElementById('btn-signup');
    btn.disabled = true;
    btn.textContent = 'Creating account…';
    try {
      const res  = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:        document.getElementById('s-email').value.trim(),
          password:     document.getElementById('s-pass').value,
          display_name: document.getElementById('s-name').value.trim(),
        }),
      });
      const data = await res.json();
      if (!res.ok) { showErr('signup-err', data.error); return; }
      saveAndRedirect(data.token, data.user);
    } catch {
      showErr('signup-err', 'Network error — please try again');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  }

  function saveAndRedirect(token, user) {
    localStorage.setItem('tz_learn_token', token);
    localStorage.setItem('tz_learn_user',  JSON.stringify(user));
    location.replace(nextUrl);
  }
</script>
</body>
</html>
