<script>var LESSON_DATA = [{"kind": "card", "data": {"type": "cover", "emoji": "📊", "heading": {"en": "Volume Basics", "ta": "வால்யூம் அடிப்படைகள்"}, "description": {"en": "Price shows where the market went — volume shows how many people agreed to go there.", "ta": "விலை சந்தை எங்கே சென்றது என்று காட்டுகிறது — வால்யூம் எத்தனை பேர் அங்கே செல்ல ஒப்புக்கொண்டனர் என்று காட்டுகிறது."}}}, {"kind": "card", "data": {"type": "visual", "emoji": "🗣️", "title": {"en": "A move on high volume is a crowd speaking — low volume is a whisper", "ta": "அதிக வால்யூமில் ஒரு நகர்வு கூட்டம் பேசுவது — குறைந்த வால்யூம் ஒரு கிசுகிசு"}, "caption": {"en": "The same price move means very different things depending on how many participants were involved. Volume is the measure of that participation.", "ta": "அதே விலை நகர்வு எத்தனை பங்கேற்பாளர்கள் ஈடுபட்டனர் என்பதைப் பொறுத்து மிகவும் வேறுபட்ட அர்த்தங்களை கொண்டிருக்கிறது. வால்யூம் அந்த பங்கேற்பின் அளவீடு."}}}, {"kind": "card", "data": {"type": "content", "pill": {"en": "What is Volume?", "ta": "வால்யூம் என்றால் என்ன?"}, "blocks": [{"type": "paragraph", "text": {"en": "Volume is the total number of shares (or contracts) that were traded during a candle's time period. If 50 lakh shares of Reliance were bought and sold in a single trading session, the volume for that session is 50 lakh shares. Every trade — one buy matched with one sell — counts as volume.", "ta": "வால்யூம் என்பது ஒரு மெழுகுவர்த்தியின் நேர காலகட்டத்தில் வர்த்தகம் செய்யப்பட்ட மொத்த பங்குகளின் (அல்லது ஒப்பந்தங்களின்) எண்ணிக்கை. ஒரே வர்த்தக அமர்வில் ரிலையன்ஸின் 50 லட்சம் பங்குகள் வாங்கப்பட்டு விற்கப்பட்டால், அந்த அமர்வின் வால்யூம் 50 லட்சம் பங்குகள். ஒவ்வொரு வர்த்தகமும் — ஒரு வாங்குதல் ஒரு விற்பனையுடன் பொருந்துகிறது — வால்யூமாக கணக்கிடப்படுகிறது."}}, {"type": "callout", "text": {"en": "Volume is the second most important piece of information on a chart, after price itself. It tells you the level of conviction behind each price move — was the move backed by many participants, or just a few?", "ta": "வால்யூம் ஒரு வரைபடத்தில் விலைக்கு அடுத்து இரண்டாவது மிக முக்கியமான தகவல். ஒவ்வொரு விலை நகர்வின் பின்னாலும் உள்ள நம்பிக்கையின் அளவை அது சொல்கிறது — நகர்வு பல பங்கேற்பாளர்களால் ஆதரிக்கப்பட்டதா, அல்லது சிலரால் மட்டுமா?"}}]}}, {"kind": "card", "data": {"type": "content", "pill": {"en": "How Volume Appears", "ta": "வால்யூம் எவ்வாறு தோன்றுகிறது"}, "blocks": [{"type": "headline", "text": {"en": "Bars at the bottom of the chart", "ta": "வரைபடத்தின் கீழே பட்டைகள்"}}, {"type": "paragraph", "text": {"en": "Volume is displayed as vertical bars running along the bottom of the chart. Each bar corresponds to one candle above it — the taller the volume bar, the more shares were traded during that candle's time period. A very tall volume bar means an unusually large number of participants were active.", "ta": "வால்யூம் வரைபடத்தின் கீழே செல்லும் செங்குத்து பட்டைகளாக காட்டப்படுகிறது. ஒவ்வொரு பட்டையும் அதற்கு மேலே உள்ள ஒரு மெழுகுவர்த்திக்கு ஒத்துள்ளது — வால்யூம் பட்டை எவ்வளவு உயரமாக உள்ளது, அந்த மெழுகுவர்த்தியின் நேர காலகட்டத்தில் அதிக பங்குகள் வர்த்தகம் செய்யப்பட்டன. மிக உயரமான வால்யூம் பட்டை என்பது அசாதாரணமான எண்ணிக்கையிலான பங்கேற்பாளர்கள் செயலில் இருந்தனர் என்று அர்த்தம்."}}, {"type": "key_value", "items": [{"key": {"en": "Average Volume", "ta": "சராசரி வால்யூம்"}, "val": {"en": "The baseline — what a normal day looks like for that stock. Each stock has its own typical volume range.", "ta": "அடிப்படை — அந்த பங்கிற்கு ஒரு சாதாரண நாள் எப்படி இருக்கும். ஒவ்வொரு பங்கும் தனது சொந்த வழக்கமான வால்யூம் வரம்பை கொண்டுள்ளது."}}, {"key": {"en": "Above-Average Volume", "ta": "சராசரிக்கு மேல் வால்யூம்"}, "val": {"en": "More participants than usual. Something notable may be happening — news, results, index rebalancing, or large institutional activity.", "ta": "வழக்கத்திற்கும் அதிக பங்கேற்பாளர்கள். குறிப்பிடத்தக்க ஏதோ நடக்கலாம் — செய்தி, முடிவுகள், குறியீட்டு மறுசீரமைப்பு, அல்லது பெரிய நிறுவன செயல்பாடு."}}, {"key": {"en": "Below-Average Volume", "ta": "சராசரிக்கு கீழ் வால்யூம்"}, "val": {"en": "Fewer participants than usual. Moves on low volume are less convincing — fewer people agreed to transact at those prices.", "ta": "வழக்கத்திற்கும் குறைவான பங்கேற்பாளர்கள். குறைந்த வால்யூமில் நகர்வுகள் குறைவான நம்பிக்கையுடன் இருக்கும் — குறைவான நபர்கள் அந்த விலைகளில் வர்த்தகம் செய்ய ஒப்புக்கொண்டனர்."}}]}]}}, {"kind": "card", "data": {"type": "content", "pill": {"en": "Volume + Price Together", "ta": "வால்யூம் + விலை சேர்ந்து"}, "blocks": [{"type": "headline", "text": {"en": "The four combinations to observe", "ta": "கவனிக்க வேண்டிய நான்கு சேர்க்கைகள்"}}, {"type": "key_value", "items": [{"key": {"en": "Price Up + High Volume", "ta": "விலை மேலே + அதிக வால்யூம்"}, "val": {"en": "Strong bullish signal — many participants drove price higher together. The move has broad participation.", "ta": "வலுவான புல்லிஷ் சமிக்ஞை — பல பங்கேற்பாளர்கள் சேர்ந்து விலையை அதிகமாக தள்ளினார்கள். நகர்வுக்கு பரவலான பங்கேற்பு உள்ளது."}}, {"key": {"en": "Price Up + Low Volume", "ta": "விலை மேலே + குறைந்த வால்யூம்"}, "val": {"en": "Weaker signal — price rose but without many participants. The move may not be sustained.", "ta": "பலவீனமான சமிக்ஞை — விலை உயர்ந்தது ஆனால் அதிக பங்கேற்பாளர்கள் இல்லாமல். நகர்வு தொடராமல் போகலாம்."}}, {"key": {"en": "Price Down + High Volume", "ta": "விலை கீழே + அதிக வால்யூம்"}, "val": {"en": "Strong bearish signal — many participants agreed to sell at lower prices. Heavy distribution or panic selling.", "ta": "வலுவான பியரிஷ் சமிக்ஞை — பல பங்கேற்பாளர்கள் குறைந்த விலைகளில் விற்க ஒப்புக்கொண்டனர். கனமான விநியோகம் அல்லது பதட்ட விற்பனை."}}, {"key": {"en": "Price Down + Low Volume", "ta": "விலை கீழே + குறைந்த வால்யூம்"}, "val": {"en": "Weaker bearish signal — price fell but on thin participation. Often seen as a routine pullback within an uptrend.", "ta": "பலவீனமான பியரிஷ் சமிக்ஞை — விலை குறைந்தது ஆனால் மெல்லிய பங்கேற்புடன். பெரும்பாலும் அப்ட்ரெண்டிற்கு உள்ளே வழக்கமான பிரள்பேக்காக பார்க்கப்படுகிறது."}}]}]}}, {"kind": "quiz", "data": {"quiz_type": "mcq", "question": {"en": "Bank Nifty rises 1.5% in a session on volume that is 3× its 20-day average. Compared to a day when Bank Nifty rises the same 1.5% on below-average volume, how would a chart analyst view the high-volume session?", "ta": "பேங்க் நிஃப்டி ஒரு அமர்வில் தனது 20 நாள் சராசரியை விட 3 மடங்கு வால்யூமில் 1.5% உயர்கிறது. பேங்க் நிஃப்டி அதே 1.5% சராசரிக்கு கீழ் வால்யூமில் உயரும் நாளுடன் ஒப்பிடும்போது, அதிக வால்யூம் அமர்வை ஒரு வரைபட ஆய்வாளர் எவ்வாறு பார்ப்பார்?"}, "options": [{"en": "Both sessions are identical — the percentage gain is the same", "ta": "இரண்டு அமர்வுகளும் ஒரே மாதிரியானவை — சதவீத ஆதாயம் ஒரே மாதிரி"}, {"en": "The high-volume session is a stronger bullish observation — more participants drove the same move", "ta": "அதிக வால்யூம் அமர்வு வலுவான புல்லிஷ் கவனிப்பு — அதிக பங்கேற்பாளர்கள் அதே நகர்வை தள்ளினார்கள்"}, {"en": "The low-volume session is stronger — fewer participants means less selling pressure", "ta": "குறைந்த வால்யூம் அமர்வு வலுவானது — குறைவான பங்கேற்பாளர்கள் குறைவான விற்பனை அழுத்தம் என்று அர்த்தம்"}, {"en": "High volume always means the move will reverse the next day", "ta": "அதிக வால்யூம் எப்போதும் நகர்வு அடுத்த நாள் திரும்பும் என்று அர்த்தம்"}], "correct_index": 1, "explanation": {"en": "Volume at 3× the average means a far larger number of market participants were actively involved in that session's rise. When many participants agree to transact at higher prices, the move is considered to have broader conviction. The same price gain on below-average volume has fewer participants behind it and is observed as less convincing.", "ta": "சராசரியை விட 3 மடங்கு வால்யூம் என்பது மிக அதிக எண்ணிக்கையிலான சந்தை பங்கேற்பாளர்கள் அந்த அமர்வின் உயர்வில் தீவிரமாக ஈடுபட்டனர் என்று அர்த்தம். பல பங்கேற்பாளர்கள் அதிக விலைகளில் வர்த்தகம் செய்ய ஒப்புக்கொள்ளும்போது, நகர்வு பரவலான நம்பிக்கையை கொண்டிருப்பதாக கருதப்படுகிறது. சராசரிக்கு கீழ் வால்யூமில் அதே விலை ஆதாயம் குறைவான பங்கேற்பாளர்களை கொண்டிருக்கும், குறைவான நம்பிக்கையுள்ளதாக கவனிக்கப்படுகிறது."}, "is_required": true, "display_order": 5}}, {"kind": "card", "data": {"type": "content", "pill": {"en": "Volume Spikes", "ta": "வால்யூம் ஸ்பைக்குகள்"}, "blocks": [{"type": "headline", "text": {"en": "Sudden surges in volume are worth studying", "ta": "வால்யூமில் திடீர் அதிகரிப்புகளை படிக்க மதிப்புள்ளது"}}, {"type": "paragraph", "text": {"en": "A volume spike is a candle where volume is significantly higher than the recent average — often 2× to 5× or more. These spikes frequently coincide with important price events: breakouts from key levels, reversals, earnings announcements, or major news that brings in large numbers of participants all at once.", "ta": "ஒரு வால்யூம் ஸ்பைக் என்பது சமீபத்திய சராசரியை விட வால்யூம் கணிசமாக அதிகமாக இருக்கும் ஒரு மெழுகுவர்த்தி — பெரும்பாலும் 2× முதல் 5× அல்லது அதிகம். இந்த ஸ்பைக்குகள் முக்கியமான விலை நிகழ்வுகளுடன் அடிக்கடி ஒத்துப்போகின்றன: முக்கிய நிலைகளிலிருந்து பிரேக்அவுட்கள், திரும்பல்கள், வருவாய் அறிவிப்புகள், அல்லது ஒரே நேரத்தில் அதிக எண்ணிக்கையிலான பங்கேற்பாளர்களை கொண்டுவரும் முக்கிய செய்திகள்."}}, {"type": "callout-note", "text": {"en": "A volume spike on a price breakout above resistance is observed as stronger confirmation than a breakout with normal volume. Similarly, a sharp price fall on extreme volume may indicate a climactic move — many participants rushing to exit at the same time.", "ta": "எதிர்ப்புக்கு மேலே விலை பிரேக்அவுட்டில் வால்யூம் ஸ்பைக் சாதாரண வால்யூமுடன் பிரேக்அவுட்டை விட வலுவான உறுதிப்படுத்தலாக கவனிக்கப்படுகிறது. இதேபோல், தீவிர வால்யூமில் கூர்மையான விலை வீழ்ச்சி ஒரு உச்சகட்ட நகர்வை குறிக்கலாம் — பல பங்கேற்பாளர்கள் ஒரே நேரத்தில் வெளியேற விரைகிறார்கள்."}}]}}, {"kind": "quiz", "data": {"quiz_type": "tf", "question": {"en": "High volume on a candle always means price will continue moving in the same direction on the next candle.", "ta": "ஒரு மெழுகுவர்த்தியில் அதிக வால்யூம் என்பது எப்போதும் அடுத்த மெழுகுவர்த்தியில் விலை அதே திசையில் தொடர்ந்து நகரும் என்று அர்த்தம்."}, "options": [{"en": "True", "ta": "உண்மை"}, {"en": "False", "ta": "பொய்"}], "correct_index": 1, "explanation": {"en": "False. High volume shows strong participation in that candle's move — but it does not guarantee continuation. In fact, very high volume sometimes marks a reversal point, not a continuation. For example, a price spike on extreme volume followed by a close near the low can indicate that sellers overwhelmed buyers despite an initial surge. Volume provides context — it does not predict the next candle.", "ta": "பொய். அதிக வால்யூம் அந்த மெழுகுவர்த்தியின் நகர்வில் வலுவான பங்கேற்பை காட்டுகிறது — ஆனால் தொடர்வதை உத்தரவாதம் செய்யவில்லை. உண்மையில், மிக அதிக வால்யூம் சில நேரங்களில் தொடர்வதை அல்ல, ஒரு திரும்பல் புள்ளியை குறிக்கிறது. உதாரணமாக, தீவிர வால்யூமில் விலை ஸ்பைக் ஆனது கீழ் நிலையில் மூடலுடன் விற்பவர்கள் ஆரம்ப ஏற்றம் இருந்தாலும் வாங்குவோரை அதிகமாக தள்ளினார்கள் என்று குறிக்கலாம். வால்யூம் சூழலை வழங்குகிறது — அடுத்த மெழுகுவர்த்தியை கணிக்காது."}, "is_required": true, "display_order": 7}}, {"kind": "card", "data": {"type": "content", "pill": {"en": "Volume in Context", "ta": "சூழலில் வால்யூம்"}, "blocks": [{"type": "headline", "text": {"en": "Always compare volume to its own recent average", "ta": "வால்யூமை எப்போதும் தனது சமீபத்திய சராசரியுடன் ஒப்பிடுங்கள்"}}, {"type": "paragraph", "text": {"en": "Volume is relative, not absolute. A volume of 50 lakh shares is high for a mid-cap stock but routine for Reliance Industries. Always compare a session's volume to that stock's own 10 to 20-day average volume — not to the volume of another stock.", "ta": "வால்யூம் சார்பானது, முழுமையானது அல்ல. 50 லட்சம் பங்குகளின் வால்யூம் ஒரு மிட்-கேப் பங்கிற்கு அதிகமாக இருக்கும், ஆனால் ரிலையன்ஸ் இண்டஸ்ட்ரீஸிற்கு வழக்கமானது. ஒரு அமர்வின் வால்யூமை எப்போதும் அந்த பங்கின் சொந்த 10 முதல் 20 நாள் சராசரி வால்யூமுடன் ஒப்பிடுங்கள் — மற்றொரு பங்கின் வால்யூமுடன் அல்ல."}}, {"type": "callout-warning", "text": {"en": "Volume alone is never enough to act on. Always combine it with price structure, trend, and support/resistance context. For educational purposes only. Not investment advice. Consult a SEBI-registered adviser before trading.", "ta": "வால்யூம் மட்டுமே செயல்படுவதற்கு போதாது. எப்போதும் விலை அமைப்பு, ட்ரெண்ட் மற்றும் ஆதரவு/எதிர்ப்பு சூழலுடன் இணைக்கவும். கல்வி நோக்கங்களுக்காக மட்டுமே. முதலீட்டு ஆலோசனை அல்ல. வர்த்தகம் செய்வதற்கு முன் SEBI-பதிவு செய்யப்பட்ட ஆலோசகரை அணுகவும்."}}, {"type": "link", "label": {"en": "Study: NSE Market Activity Data", "ta": "படியுங்கள்: NSE சந்தை செயல்பாடு தரவு"}, "description": {"en": "View volume data for Nifty stocks on NSE's official portal — observe which stocks are seeing unusual activity on any given day.", "ta": "NSE இன் அதிகாரப்பூர்வ தளத்தில் நிஃப்டி பங்குகளுக்கான வால்யூம் தரவை பாருங்கள் — எந்த நாளிலும் அசாதாரண செயல்பாட்டை காணும் பங்குகளை கவனியுங்கள்."}, "url": "https://www.nseindia.com/market-data/live-equity-market"}]}}, {"kind": "quiz", "data": {"quiz_type": "mcq", "question": {"en": "Infosys drops 3% on a day when its volume is only 30% of its 20-day average. The next analyst compares this to a day when Infosys drops the same 3% on 4× its average volume. Which drop is considered more significant from a chart observation standpoint?", "ta": "இன்ஃபோசிஸ் தனது 20 நாள் சராசரியில் 30% மட்டுமே வால்யூமில் 3% குறைகிறது. அடுத்த ஆய்வாளர் இதை இன்ஃபோசிஸ் தனது சராசரி வால்யூமில் 4× அளவில் அதே 3% குறையும் நாளுடன் ஒப்பிடுகிறார். வரைபட கவனிப்பு கண்ணோட்டத்தில் எந்த வீழ்ச்சி அதிக முக்கியமானதாக கருதப்படுகிறது?"}, "options": [{"en": "The low-volume drop — fewer sellers means more room to recover", "ta": "குறைந்த வால்யூம் வீழ்ச்சி — குறைவான விற்பவர்கள் மீட்டெடுக்க அதிக இடம்"}, {"en": "Both are equally significant — the percentage decline is the same", "ta": "இரண்டும் சமமாக முக்கியமானவை — சதவீத வீழ்ச்சி ஒரே மாதிரி"}, {"en": "The high-volume drop — many participants agreed to sell at lower prices, showing stronger bearish conviction", "ta": "அதிக வால்யூம் வீழ்ச்சி — பல பங்கேற்பாளர்கள் குறைந்த விலைகளில் விற்க ஒப்புக்கொண்டனர், வலுவான பியரிஷ் நம்பிக்கையை காட்டுகிறது"}, {"en": "Neither — volume is irrelevant when studying a price decline", "ta": "எதுவும் அல்ல — விலை வீழ்ச்சியை படிக்கும்போது வால்யூம் பொருட்படாது"}], "correct_index": 2, "explanation": {"en": "The high-volume drop is more significant. When many participants sell at the same time, driving price down 3% on 4× average volume, it shows widespread agreement to exit at lower prices — that is strong bearish conviction. The same 3% drop on only 30% of average volume means very few participants were involved, making it a much less meaningful move. Low-volume pullbacks in uptrends are often seen as routine; high-volume drops are studied more carefully.", "ta": "அதிக வால்யூம் வீழ்ச்சி அதிக முக்கியமானது. பல பங்கேற்பாளர்கள் ஒரே நேரத்தில் விற்கும்போது, சராசரி வால்யூமில் 4× அளவில் விலையை 3% கீழே தள்ளும்போது, குறைந்த விலைகளில் வெளியேற பரவலான ஒப்புதலை காட்டுகிறது — அது வலுவான பியரிஷ் நம்பிக்கை. சராசரியில் 30% மட்டுமே வால்யூமில் அதே 3% வீழ்ச்சி மிக குறைவான பங்கேற்பாளர்கள் ஈடுபட்டனர் என்று அர்த்தம், மிகவும் குறைவான அர்த்தமுள்ள நகர்வாக செய்கிறது. அப்ட்ரெண்டுகளில் குறைந்த வால்யூம் பிரள்பேக்குகள் பெரும்பாலும் வழக்கமானதாக பார்க்கப்படுகின்றன; அதிக வால்யூம் வீழ்ச்சிகள் கவனமாக படிக்கப்படுகின்றன."}, "is_required": true, "display_order": 10}}, {"kind": "card", "data": {"type": "result"}}];</script>

  --tz-border-accent:rgba(100,81,220,0.32);
  --tz-fg-1:#0f1020;--tz-fg-2:#4a4f6e;--tz-fg-3:#9ea3be;
  --tz-gain:#0e9966;--tz-gain-dim:rgba(14,153,102,0.12);
  --tz-loss:#c43d3d;--tz-loss-dim:rgba(196,61,61,0.10);
}
/* ── Halo aurora base ────────────────────────────────────── */
:root,[data-bs-theme="dark"],[data-bs-theme="light"]{
  --bs-primary:var(--tz-accent-1);--bs-body-bg:var(--tz-bg);--bs-body-color:var(--tz-fg-1);
  --bs-body-font-family:var(--tz-font-ui);--bs-body-font-size:15px;
  --bs-border-color:var(--tz-border);--bs-border-radius:var(--tz-radius-md);
  --bs-border-radius-lg:var(--tz-radius-lg);--bs-border-radius-xl:var(--tz-radius-xl);
}
html,body{background:var(--tz-bg);color:var(--tz-fg-1);font-family:var(--tz-font-ui);-webkit-font-smoothing:antialiased;}
body{overflow-x:hidden;}
:lang(ta),[lang="ta"]{font-family:var(--tz-font-tamil);}
.text-gradient{background:var(--tz-grad-h);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.lang-toggle{display:inline-flex;background:var(--tz-surface);border:1px solid var(--tz-border);border-radius:var(--tz-radius-full);padding:3px;}
.lang-toggle button{border:none;background:transparent;padding:5px 14px;border-radius:var(--tz-radius-full);color:var(--tz-fg-2);font-family:var(--tz-font-ui);font-size:12px;font-weight:600;cursor:pointer;transition:all 180ms var(--tz-ease-out);}
.lang-toggle button.is-active{background:var(--tz-grad);color:#fff;box-shadow:var(--tz-glow-soft);}
.lang-toggle button[data-lang="ta"]{font-family:var(--tz-font-tamil);font-weight:500;}
.btn-ghost{background:var(--tz-surface);color:var(--tz-fg-1);border:1px solid var(--tz-border-strong);border-radius:var(--tz-radius-lg);padding:11px 20px;font-size:14.5px;font-weight:500;display:inline-flex;align-items:center;gap:8px;}
.btn-ghost:hover{background:var(--tz-surface-2);color:var(--tz-fg-1);}
.btn-ghost.btn-sm{padding:7px 14px;font-size:13px;}
/* ── Tutorial CSS ────────────────────────────────────────── */
.level-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 12px 5px 8px;border-radius:999px;border:1px solid var(--tz-border-accent);background:rgba(var(--tz-accent-rgb),0.06);font-family:var(--tz-font-mono);font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--tz-fg-1);}
.level-badge .dots{display:inline-flex;gap:3px;align-items:center;}
.level-badge .dots i{width:6px;height:6px;border-radius:50%;background:var(--tz-fg-3);display:block;}
.level-badge[data-level="beginner"]{color:var(--tz-gain);border-color:rgba(52,211,153,0.35);background:var(--tz-gain-dim);}
.level-badge[data-level="beginner"] .dots i:nth-child(-n+1){background:var(--tz-gain);}
.quiz-q{background:var(--tz-surface);border:1px solid var(--tz-border);border-radius:var(--tz-radius-xl);padding:24px;position:relative;overflow:hidden;}
.quiz-q h3{font-family:var(--tz-font-ui);font-size:18px;font-weight:700;color:var(--tz-fg-1);letter-spacing:-0.015em;margin:0 0 18px;}
.quiz-q .qhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;font-family:var(--tz-font-mono);font-size:10.5px;letter-spacing:0.16em;color:var(--tz-fg-3);}
.quiz-q .qhead .qkind{color:var(--tz-accent-1);}
.q-options{display:flex;flex-direction:column;gap:10px;}
.q-option{width:100%;text-align:left;background:var(--tz-bg-elev);border:1px solid var(--tz-border);border-radius:var(--tz-radius-lg);padding:14px 16px;font-family:var(--tz-font-ui);font-size:15px;font-weight:500;color:var(--tz-fg-1);cursor:pointer;transition:all 180ms var(--tz-ease-out);display:flex;align-items:center;gap:12px;}
.q-option:hover{border-color:var(--tz-border-strong);background:var(--tz-surface-2);}
.q-option .key{width:26px;height:26px;border-radius:8px;background:var(--tz-surface-2);border:1px solid var(--tz-border);display:inline-flex;align-items:center;justify-content:center;font-family:var(--tz-font-mono);font-size:12px;font-weight:700;color:var(--tz-fg-2);flex-shrink:0;}
.q-option .label{flex:1;}
.q-option .tick{width:22px;height:22px;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.q-option[data-state="correct"]{background:var(--tz-gain-dim);border-color:rgba(52,211,153,0.45);color:var(--tz-fg-1);}
.q-option[data-state="correct"] .key{background:var(--tz-gain);border-color:var(--tz-gain);color:#06070f;}
.q-option[data-state="correct"] .tick{display:inline-flex;color:var(--tz-gain);}
.q-option[data-state="wrong"]{background:var(--tz-loss-dim);border-color:rgba(248,113,113,0.45);}
.q-option[data-state="wrong"] .key{background:var(--tz-loss);border-color:var(--tz-loss);color:#06070f;}
.q-option[data-state="wrong"] .tick{display:inline-flex;color:var(--tz-loss);}
.q-option[data-locked]:not([data-state]){opacity:0.55;cursor:not-allowed;pointer-events:none;}
.q-feedback{display:none;margin-top:14px;padding:14px 16px;border-radius:var(--tz-radius-lg);font-family:var(--tz-font-ui);font-size:13.5px;line-height:1.55;border:1px solid;align-items:flex-start;gap:10px;}
.q-feedback.is-shown{display:flex;}
.q-feedback.is-correct{background:var(--tz-gain-dim);border-color:rgba(52,211,153,0.35);color:var(--tz-fg-1);}
.q-feedback.is-wrong{background:var(--tz-loss-dim);border-color:rgba(248,113,113,0.35);color:var(--tz-fg-1);}
.q-feedback .head{font-family:var(--tz-font-mono);font-size:10.5px;letter-spacing:0.16em;font-weight:700;text-transform:uppercase;margin-bottom:4px;}
.q-feedback.is-correct .head{color:var(--tz-gain);}
.q-feedback.is-wrong .head{color:var(--tz-loss);}
.q-feedback>div{flex:1;min-width:0;}
.q-feedback .fb-ok,.q-feedback .fb-no{display:none;}
.q-feedback.is-correct .fb-ok{display:inline;}
.q-feedback.is-wrong .fb-no{display:inline;}
.result-card{background:var(--tz-surface);border:1px solid var(--tz-border-accent);border-radius:var(--tz-radius-2xl);padding:36px 32px;text-align:center;position:relative;overflow:hidden;}
.result-card::before{content:'';position:absolute;inset:0;background:radial-gradient(60% 60% at 50% 0%,rgba(var(--tz-accent-rgb),0.20) 0%,transparent 70%);pointer-events:none;}
.result-card>*{position:relative;}
.result-card .trophy{width:76px;height:76px;border-radius:999px;background:var(--tz-grad);display:inline-flex;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(var(--tz-accent-rgb),0.5);margin-bottom:16px;}
.result-card .score{font-family:var(--tz-font-display);font-size:64px;line-height:1;font-weight:400;letter-spacing:-0.04em;margin:8px 0 4px;font-variant-numeric:tabular-nums;}
.result-card .score .of{font-style:italic;color:var(--tz-fg-3);font-size:0.5em;}
.result-card .blurb{font-family:var(--tz-font-display);font-style:italic;font-size:22px;color:var(--tz-fg-2);margin:4px 0 24px;}
.result-card .rewards{display:inline-flex;gap:12px;margin-bottom:22px;flex-wrap:wrap;justify-content:center;}
.result-card .reward-chip{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;background:var(--tz-bg-elev);border:1px solid var(--tz-border);border-radius:999px;font-family:var(--tz-font-mono);font-size:12px;font-weight:700;color:var(--tz-fg-1);}
.result-card .reward-chip .glyph{color:var(--tz-accent-1);font-size:16px;}
.confetti{position:fixed;pointer-events:none;inset:0;z-index:2000;overflow:hidden;}
.confetti span{position:absolute;display:block;width:8px;height:14px;top:-20px;animation:confetti-fall 2.4s linear forwards;}
@keyframes confetti-fall{to{transform:translate3d(var(--dx,0),110vh,0) rotate(720deg);opacity:0;}}
@media (prefers-reduced-motion:reduce){.confetti span{animation:none;display:none;}}

/* ── Page layout ─────────────────────────────────────────── */
body{min-height:100vh;padding:0;display:flex;align-items:center;justify-content:center;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(50% 40% at 20% 20%,rgba(124,106,247,0.16) 0%,transparent 60%),radial-gradient(50% 40% at 80% 80%,rgba(91,138,245,0.14) 0%,transparent 60%);pointer-events:none;z-index:0;}

/* Drop zone */
#dropzone{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;background:var(--tz-bg);}
#dropzone .box{width:min(460px,90vw);padding:48px 32px;border:2px dashed var(--tz-border-accent);border-radius:var(--tz-radius-2xl);text-align:center;background:rgba(var(--tz-accent-rgb),0.04);transition:background 200ms;cursor:pointer;}
#dropzone .box.drag-over{background:rgba(var(--tz-accent-rgb),0.12);border-color:var(--tz-accent-1);}
#dropzone .box .icon{font-size:48px;margin-bottom:12px;}
#dropzone .box h2{font-family:var(--tz-font-display);font-size:24px;font-weight:400;letter-spacing:-0.02em;color:var(--tz-fg-1);margin:0 0 8px;}
#dropzone .box p{font-family:var(--tz-font-ui);font-size:14px;color:var(--tz-fg-3);margin:0 0 20px;}
#dropzone .box .btn-pick{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:var(--tz-grad);color:#fff;border:none;border-radius:var(--tz-radius-lg);font-family:var(--tz-font-ui);font-size:14px;font-weight:600;cursor:pointer;box-shadow:var(--tz-glow);}
#dropzone .or{font-family:var(--tz-font-mono);font-size:11px;letter-spacing:0.16em;color:var(--tz-fg-3);text-transform:uppercase;}
#dropzone textarea{width:min(460px,90vw);height:120px;background:var(--tz-surface);border:1px solid var(--tz-border);border-radius:var(--tz-radius-lg);color:var(--tz-fg-1);font-family:var(--tz-font-mono);font-size:12px;padding:12px 14px;resize:none;outline:none;}
#dropzone textarea:focus{border-color:var(--tz-border-accent);}
#dropzone textarea::placeholder{color:var(--tz-fg-3);}
#dropzone .btn-load{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:var(--tz-surface);color:var(--tz-accent-1);border:1px solid var(--tz-border-accent);border-radius:var(--tz-radius-lg);font-family:var(--tz-font-ui);font-size:14px;font-weight:600;cursor:pointer;transition:background 150ms;}
#dropzone .btn-load:hover{background:rgba(var(--tz-accent-rgb),0.10);}
#dropzone .err{font-family:var(--tz-font-mono);font-size:12px;color:var(--tz-loss);}
#dropzone.hidden{display:none;}

/* Workspace */
.workspace{position:relative;z-index:1;width:100%;max-width:1280px;padding:24px;display:grid;gap:24px;align-items:center;grid-template-columns:280px minmax(0,460px) 280px;justify-content:center;min-height:100vh;}
@media(max-width:1199.98px){.workspace{grid-template-columns:240px minmax(0,440px) 240px;gap:18px;padding:18px;}}
@media(max-width:991.98px){.workspace{grid-template-columns:1fr;max-width:460px;padding:24px 12px;}.rail{display:none!important;}}
@media(max-width:575.98px){.workspace{padding:0;align-items:stretch;max-width:none;min-height:100vh;gap:0;}}

/* Stage */
.stage{position:relative;width:100%;aspect-ratio:9/16;max-height:calc(100vh - 48px);background:var(--tz-bg-elev);border:1px solid var(--tz-border);border-radius:32px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,0.5),0 0 0 1px var(--tz-border);display:flex;flex-direction:column;justify-self:center;}
@media(max-width:575.98px){.stage{aspect-ratio:auto;height:100vh;max-height:none;border-radius:0;border:none;box-shadow:none;}}

/* Rail */
.rail{align-self:stretch;display:flex;flex-direction:column;gap:14px;max-height:calc(100vh - 48px);overflow-y:auto;scrollbar-width:none;padding:4px;}
.rail::-webkit-scrollbar{display:none;}
.rail-card{background:var(--tz-surface);border:1px solid var(--tz-border);border-radius:var(--tz-radius-xl);padding:18px;}
.rail-card .head{font-family:var(--tz-font-mono);font-size:10.5px;letter-spacing:0.16em;color:var(--tz-fg-3);text-transform:uppercase;margin-bottom:10px;}
.rail-card h3{font-family:var(--tz-font-display);font-size:22px;line-height:1.15;letter-spacing:-0.02em;color:var(--tz-fg-1);font-weight:400;margin:0 0 4px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px;}
.stat-grid .stat{padding:12px;background:var(--tz-bg-elev);border:1px solid var(--tz-border);border-radius:var(--tz-radius-md);text-align:center;}
.stat-grid .stat .k{font-family:var(--tz-font-mono);font-size:9px;letter-spacing:0.18em;color:var(--tz-fg-3);text-transform:uppercase;}
.stat-grid .stat .v{font-family:var(--tz-font-mono);font-size:20px;font-weight:700;color:var(--tz-fg-1);margin-top:4px;}
.stat-grid .stat .v.accent{color:var(--tz-accent-1);}
.outline{list-style:none;padding:0;margin:14px 0 0;display:flex;flex-direction:column;gap:0;}
.outline li{display:flex;gap:10px;align-items:center;padding:7px 10px;border-radius:var(--tz-radius-md);font-family:var(--tz-font-ui);font-size:13px;color:var(--tz-fg-3);cursor:pointer;transition:background 180ms var(--tz-ease-out);position:relative;}
.outline li:hover{background:var(--tz-surface-2);}
.outline li:not(.sep):not(:last-child)::after{content:'';position:absolute;left:19px;top:calc(7px + 20px);height:calc(100% - 20px - 7px + 7px);width:2px;background:var(--tz-border);border-radius:999px;z-index:0;}
.outline li .marker{width:20px;height:20px;border-radius:999px;background:var(--tz-surface-2);border:1px solid var(--tz-border);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-family:var(--tz-font-mono);font-size:10px;font-weight:700;color:var(--tz-fg-3);position:relative;z-index:1;}
.outline li .label{flex:1;min-width:0;}
.outline li.is-done .marker{background:var(--tz-gain-dim);border-color:rgba(52,211,153,0.35);color:var(--tz-gain);}
.outline li.is-done .marker::before{content:'✓';}
.outline li.is-done .marker .num{display:none;}
.outline li.is-active{background:rgba(var(--tz-accent-rgb),0.10);color:var(--tz-fg-1);font-weight:600;}
.outline li.is-active .marker{background:var(--tz-grad);border-color:transparent;color:#fff;box-shadow:var(--tz-glow-soft);}
.rail-tip{padding:14px;background:rgba(var(--tz-accent-rgb),0.06);border:1px solid var(--tz-border-accent);border-radius:var(--tz-radius-lg);display:flex;gap:10px;align-items:flex-start;}
.rail-tip .glyph{font-size:18px;line-height:1.2;flex-shrink:0;}
.rail-tip .body{font-family:var(--tz-font-ui);font-size:12.5px;line-height:1.5;color:var(--tz-fg-1);}
.rail-tip .body .k{display:block;font-family:var(--tz-font-mono);font-size:10px;letter-spacing:0.16em;color:var(--tz-accent-1);text-transform:uppercase;margin-bottom:3px;}

/* Stage internals */
.stage-top{padding:14px 18px 0;flex-shrink:0;}
.dots{display:flex;gap:4px;margin-bottom:12px;}
.dots .seg{flex:1;height:3px;border-radius:999px;background:rgba(255,255,255,0.10);overflow:hidden;position:relative;}
.dots .seg .fill{position:absolute;inset:0;width:0;background:var(--tz-grad-h);border-radius:999px;transition:width 280ms var(--tz-ease-out);}
.dots .seg.is-done .fill,.dots .seg.is-active .fill{width:100%;}
.top-row{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.top-row .close{width:36px;height:36px;border-radius:999px;background:rgba(255,255,255,0.06);border:none;color:var(--tz-fg-1);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
.top-row .close:hover{background:rgba(255,255,255,0.12);}
.top-row .meta{flex:1;text-align:center;font-family:var(--tz-font-mono);font-size:10.5px;letter-spacing:0.16em;color:var(--tz-fg-3);text-transform:uppercase;}
.top-row .meta .now{color:var(--tz-fg-1);}
.stage .lang-toggle{transform:scale(0.85);transform-origin:right center;}
.deck{flex:1;position:relative;overflow:hidden;}
.deck::after{content:'';position:absolute;bottom:0;left:0;right:0;height:110px;background:linear-gradient(to bottom,transparent 0%,var(--tz-bg-elev) 100%);pointer-events:none;z-index:3;}
.card-slide{
  position:absolute;inset:0;padding:28px 24px 120px;display:flex;flex-direction:column;
  opacity:0;
  transform:translateX(var(--enter-from,52px)) scale(0.97);
  pointer-events:none;
  transition:transform 390ms cubic-bezier(0.16,1,0.3,1),opacity 280ms ease;
  overflow-y:auto;scrollbar-width:none;will-change:transform,opacity;
}
.card-slide::-webkit-scrollbar{display:none;}
.card-slide.is-active{opacity:1;transform:translateX(0) scale(1);pointer-events:auto;}
.card-slide.is-prev{opacity:0;transform:translateX(var(--exit-to,-52px)) scale(0.97);pointer-events:none;}
@media(prefers-reduced-motion:reduce){
  .card-slide,.card-slide.is-active,.card-slide.is-prev{transition:opacity 200ms ease;transform:none!important;}
}
.card-level{align-self:flex-start;margin-bottom:20px;}
.card-emoji{font-size:64px;line-height:1;display:block;margin-bottom:14px;}
.visual-hero{font-size:108px;line-height:1;text-align:center;flex:1;display:flex;align-items:center;justify-content:center;}
.card-title{font-family:var(--tz-font-display);font-size:clamp(26px,7vw,34px);line-height:1.1;letter-spacing:-0.025em;color:var(--tz-fg-1);font-weight:400;margin:0 0 14px;}
.card-body{font-family:var(--tz-font-ui);font-size:16px;line-height:1.6;color:var(--tz-fg-1);margin:0 0 12px;}
.card-body.muted{color:var(--tz-fg-2);}
.card-pill{display:inline-block;padding:5px 12px;border-radius:999px;background:var(--tz-surface);border:1px solid var(--tz-border);font-family:var(--tz-font-mono);font-size:10.5px;letter-spacing:0.16em;color:var(--tz-fg-2);text-transform:uppercase;margin-bottom:18px;}
.spacer{flex:1;min-height:8px;}
.stage-bottom{position:absolute;left:16px;right:16px;bottom:16px;display:flex;gap:10px;z-index:4;}
.stage-bottom .btn-prev,.stage-bottom .btn-next{flex:1;padding:14px 18px;border-radius:16px;font-family:var(--tz-font-ui);font-size:14.5px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all 180ms var(--tz-ease-out);}
.stage-bottom .btn-prev{background:rgba(255,255,255,0.06);color:var(--tz-fg-1);border:1px solid var(--tz-border);flex:0 0 96px;}
.stage-bottom .btn-prev:hover{background:rgba(255,255,255,0.10);}
.stage-bottom .btn-prev:disabled{opacity:0.4;cursor:not-allowed;}
.stage-bottom .btn-next{background:var(--tz-grad);color:#fff;border:none;box-shadow:var(--tz-glow);}
.stage-bottom .btn-next:hover{opacity:0.92;}
.stage-bottom .btn-next:disabled{opacity:0.4;cursor:not-allowed;box-shadow:none;}

/* Quiz overrides inside card-slide */
.card-slide .result-card{padding:24px 18px 32px;border-radius:var(--tz-radius-xl);flex:none;overflow:visible;}
.card-slide .result-card .trophy{width:60px;height:60px;}
.card-slide .result-card .score{font-size:52px;}
.card-slide .quiz-q{background:transparent;border:none;padding:0;}
.card-slide .quiz-q h3{font-family:var(--tz-font-display);font-size:22px;line-height:1.2;font-weight:400;letter-spacing:-0.02em;}
.card-slide .qhead{margin-bottom:8px;}

/* Block types */
.blk-headline{font-family:var(--tz-font-ui);font-size:15px;font-weight:700;color:var(--tz-fg-1);margin:16px 0 6px;}
.blk-callout-note{margin:12px 0;padding:11px 14px;background:var(--tz-surface);border:1px solid var(--tz-border);border-radius:var(--tz-radius-lg);font-family:var(--tz-font-ui);font-size:13px;line-height:1.5;color:var(--tz-fg-2);}
.blk-callout-warning{margin:12px 0;padding:11px 14px;background:var(--tz-loss-dim);border:1px solid rgba(248,113,113,0.25);border-radius:var(--tz-radius-lg);font-family:var(--tz-font-ui);font-size:13px;line-height:1.5;color:var(--tz-fg-1);}
.blk-bullet-list{margin:10px 0 10px 4px;padding-left:18px;display:flex;flex-direction:column;gap:6px;}
.blk-bullet-list li{font-family:var(--tz-font-ui);font-size:13.5px;line-height:1.5;color:var(--tz-fg-1);}
.blk-divider{border:none;border-top:1px solid var(--tz-border);margin:14px 0;}
.blk-key-value{display:flex;flex-direction:column;gap:6px;margin:12px 0;}
.blk-key-value .kv-row{display:flex;align-items:baseline;gap:10px;padding:9px 12px;background:var(--tz-surface);border:1px solid var(--tz-border);border-radius:var(--tz-radius-md);}
.blk-key-value .kv-k{font-family:var(--tz-font-mono);font-size:11.5px;font-weight:700;color:var(--tz-fg-2);text-transform:uppercase;letter-spacing:0.06em;flex-shrink:0;min-width:100px;}
.blk-key-value .kv-v{font-family:var(--tz-font-ui);font-size:13px;color:var(--tz-fg-1);flex:1;}
.blk-compare{display:flex;gap:10px;margin:14px 0;}
.blk-compare .cmp-cell{flex:1;padding:14px 12px;background:var(--tz-surface);border:1px solid var(--tz-border);border-radius:var(--tz-radius-lg);display:flex;flex-direction:column;gap:4px;}
.blk-compare .cmp-cell.gain{background:var(--tz-gain-dim);border-color:rgba(52,211,153,0.35);}
.blk-compare .cmp-cell.danger{background:var(--tz-loss-dim);border-color:rgba(248,113,113,0.35);}
.blk-compare .cmp-emoji{font-size:22px;margin-bottom:2px;}
.blk-compare .cmp-title{font-family:var(--tz-font-ui);font-size:13.5px;font-weight:700;color:var(--tz-fg-1);}
.blk-compare .cmp-subtitle{font-family:var(--tz-font-ui);font-size:12px;color:var(--tz-fg-3);line-height:1.4;}
.blk-badge{margin:16px 0;text-align:center;}
.blk-badge .badge-word{display:inline-block;padding:12px 28px;border-radius:14px;background:var(--tz-grad);color:#fff;font-family:var(--tz-font-display);font-size:30px;font-weight:400;letter-spacing:-0.01em;box-shadow:var(--tz-glow);}
.blk-badge .badge-sub{margin-top:10px;font-family:var(--tz-font-mono);font-size:11px;letter-spacing:0.16em;color:var(--tz-fg-3);text-transform:uppercase;}
.blk-link{display:flex;align-items:center;gap:12px;margin:12px 0;padding:14px 16px;background:var(--tz-surface);border:1px solid var(--tz-border-accent);border-radius:var(--tz-radius-lg);text-decoration:none;transition:background 150ms,border-color 150ms;}
.blk-link:hover{background:rgba(var(--tz-accent-rgb),0.10);border-color:var(--tz-accent-1);}
.blk-link-icon{font-size:18px;flex-shrink:0;}
.blk-link-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.blk-link-label{font-family:var(--tz-font-ui);font-size:14px;font-weight:600;color:var(--tz-accent-1);}
.blk-link-desc{font-family:var(--tz-font-ui);font-size:12px;color:var(--tz-fg-3);line-height:1.4;}
.blk-link-arrow{font-size:16px;flex-shrink:0;color:var(--tz-accent-1);opacity:0.55;}

/* Preview banner */
.preview-banner{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:10px;padding:6px 14px 6px 10px;background:var(--tz-surface);border:1px solid var(--tz-border-accent);border-radius:999px;font-family:var(--tz-font-mono);font-size:11px;letter-spacing:0.12em;color:var(--tz-accent-1);text-transform:uppercase;box-shadow:0 4px 24px rgba(0,0,0,0.4);white-space:nowrap;}
.preview-banner .dot{width:7px;height:7px;border-radius:50%;background:var(--tz-accent-1);box-shadow:0 0 6px var(--tz-accent-1);animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.4;}}
.preview-banner button{background:none;border:none;color:var(--tz-fg-3);cursor:pointer;font-size:14px;padding:0 0 0 6px;line-height:1;}
.preview-banner button:hover{color:var(--tz-fg-1);}
</style>
</head>
<body>

<!-- Drop zone -->
<div id="dropzone">
  <div class="box" id="dropBox">
    <div class="icon">📋</div>
    <h2>Lesson Preview</h2>
    <p>Drop a lesson JSON file here, or paste the array below</p>
    <button class="btn-pick" onclick="document.getElementById('fileInput').click()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Choose JSON file
    </button>
    <input type="file" id="fileInput" accept=".json" style="display:none" />
  </div>
  <div class="or">or paste JSON</div>
  <textarea id="jsonPaste" placeholder='[{"kind":"card","data":{"type":"cover",...}},...]'></textarea>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="btn-load" onclick="loadFromPaste()">Load JSON ↗</button>
    <span class="err" id="errMsg"></span>
  </div>
</div>

<!-- Preview banner -->
<div class="preview-banner" id="previewBanner" style="display:none">
  <span class="dot"></span>Preview mode
  <button onclick="downloadJSON()" title="Download JSON" style="color:var(--tz-accent-1);font-size:12px;padding:0 2px 0 8px;letter-spacing:0.08em;">⬇ JSON</button>
  <button onclick="resetToDropzone()" title="Load new JSON">✕</button>
</div>

<!-- Lesson workspace -->
<div class="workspace" id="workspace" style="display:none">
  <aside class="rail rail-left" id="railLeft"></aside>
  <div class="stage" id="stage">
    <header class="stage-top">
      <div class="dots" id="dots"></div>
      <div class="top-row">
        <button class="close" onclick="resetToDropzone()" aria-label="Back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <div class="meta"><span class="now">PREVIEW</span>&nbsp;·&nbsp;<span id="cardNum">1</span> / <span id="cardTotal">—</span></div>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" data-lang="en" class="is-active">EN</button>
          <button type="button" data-lang="ta">த</button>
        </div>
      </div>
    </header>
    <div class="deck" id="deck"></div>
    <div class="stage-bottom">
      <button class="btn-prev" id="prevBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back
      </button>
      <button class="btn-next" id="nextBtn">
        Continue
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </div>
  <aside class="rail rail-right" id="railRight"></aside>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── Inlined tutorial.js (TZTutor) ──────────────────────── */
(function(){
  'use strict';
  const TZ=window.TZTutor=window.TZTutor||{};
  TZ.confetti=function(count){
    const root=document.createElement('div');root.className='confetti';document.body.appendChild(root);
    const palette=['#7c6af7','#5b8af5','#34d399','#f0f1f8','#fbbf24'];
    for(let i=0;i<(count||60);i++){
      const s=document.createElement('span');
      s.style.left=(Math.random()*100)+'%';s.style.background=palette[i%palette.length];
      s.style.setProperty('--dx',((Math.random()-0.5)*200)+'px');
      s.style.animationDelay=(Math.random()*0.4)+'s';s.style.animationDuration=(1.8+Math.random()*1.2)+'s';
      s.style.borderRadius=Math.random()>0.5?'2px':'50%';root.appendChild(s);
    }
    setTimeout(()=>root.remove(),3200);
  };
  TZ.scoreBook={questions:0,correct:0,answered:new Set(),
    reset(){this.questions=0;this.correct=0;this.answered=new Set();},
    register(id){if(!this.answered.has(id))this.questions++;},
    answer(id,correct){if(this.answered.has(id))return false;this.answered.add(id);if(correct)this.correct++;TZ.updateProgress();return true;},
    pct(){return this.questions===0?0:Math.round((this.correct/this.questions)*100);}
  };
  TZ.updateProgress=function(){};
  TZ.renderResult=function(selector){
    const card=document.querySelector(selector);if(!card)return;
    const scoreEl=card.querySelector('[data-score]'),totalEl=card.querySelector('[data-total]'),xpEl=card.querySelector('[data-xp]');
    if(scoreEl)scoreEl.textContent=TZ.scoreBook.correct;
    if(totalEl)totalEl.textContent=TZ.scoreBook.questions;
    if(xpEl)xpEl.textContent=(TZ.scoreBook.correct*10)+' XP';
    const blurb=card.querySelector('[data-blurb]');
    if(blurb){
      const lang=document.documentElement.getAttribute('lang')||'en';
      const pct=TZ.scoreBook.pct();
      const key=pct===100?'perfect':pct>=67?'good':pct>=34?'pass':'retry';
      const map={perfect:['Flawless. You read the market.','களம் அறிந்தீர்கள்.'],good:['Solid. Calm trader in the making.','நல்ல தொடக்கம்.'],pass:['Got the basics. Keep going.','அடிப்படைகள் சரி. தொடரவும்.'],retry:['Review the section, then retry.','மீண்டும் படியுங்கள்.']};
      blurb.textContent=lang==='ta'?map[key][1]:map[key][0];
    }
    card.classList.add('is-shown');
    if(TZ.scoreBook.pct()>=67)TZ.confetti(100);
  };
})();
</script>
<script>
/* ── Lesson preview app ─────────────────────────────────── */
(function(){
  'use strict';
  const $=id=>document.getElementById(id);
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function gL(obj,lang){if(!obj)return '';if(typeof obj==='string')return obj;return(lang==='ta'&&obj.ta)?obj.ta:(obj.en||'');}
  function en(o){return gL(o,'en');}function ta(o){return gL(o,'ta');}

  /* lang toggle */
  function applyLang(){
    const lang=document.documentElement.getAttribute('lang')||'en';
    document.querySelectorAll('[data-en]').forEach(el=>{
      el.textContent=lang==='ta'&&el.dataset.ta?el.dataset.ta:el.dataset.en;
    });
    document.querySelectorAll('.lang-toggle button').forEach(b=>b.classList.toggle('is-active',b.dataset.lang===lang));
  }
  document.addEventListener('click',e=>{
    const btn=e.target.closest('.lang-toggle button');if(!btn)return;
    document.documentElement.setAttribute('lang',btn.dataset.lang);applyLang();
  });

  /* Adapter */
  function adaptItems(items){
    if(!Array.isArray(items))throw new Error('Expected a JSON array at the top level.');
    const KEYS=['A','B','C','D','E','F'];let qCount=0;
    const quizTotal=items.filter(i=>i.kind==='quiz').length;
    const cards=items.map((item,idx)=>{
      if(item.kind==='card'){
        const d=item.data;
        if(d.type==='result')return Object.assign({},d,{quiz_total:quizTotal,lesson_done_label:{en:'1 lesson done',ta:'1 பாடம் முடிந்தது'}});
        return d;
      }
      if(item.kind==='quiz'){
        qCount++;const d=item.data;
        const opts=(d.options||[]).map((opt,oi)=>({key:KEYS[oi]||String(oi+1),text:opt,correct:oi===d.correct_index}));
        return{type:'quiz',gate:!!d.is_required,q_id:'q'+qCount,check_label:{en:'CHECK YOUR UNDERSTANDING',ta:'உங்கள் புரிதலை சரிபாருங்கள்'},question:{kind:d.quiz_type==='tf'?'true-false':'mcq',xp:10,text:d.question,options:opts,feedback:{shared:true,text:d.explanation||{en:'',ta:''}}}};
      }
      throw new Error('Unknown item kind "'+item.kind+'" at index '+idx+'.');
    });
    const coverCard=cards.find(c=>c.type==='cover');
    const contentCards=cards.filter(c=>c.type==='content');
    const outline=contentCards.map(c=>({card:cards.indexOf(c)+1,label:c.pill||{en:'Section',ta:'பிரிவு'}}));
    return{cards,outline,title:(coverCard&&(coverCard.heading||coverCard.title))||{en:'Lesson Preview',ta:'பாட முன்னோட்டம்'}};
  }

  /* Block renderers */
  const Blocks={
    paragraph(b){return`<p class="card-body${b.variant==='muted'?' muted':''}" data-en="${esc(en(b.text))}" data-ta="${esc(ta(b.text))}">${esc(en(b.text))}</p>`;},
    tip(b){return`<div class="blk-callout-note" data-en="${esc(en(b.text))}" data-ta="${esc(ta(b.text))}">${esc(en(b.text))}</div>`;},
    headline(b){return`<h4 class="blk-headline" data-en="${esc(en(b.text))}" data-ta="${esc(ta(b.text))}">${esc(en(b.text))}</h4>`;},
    callout(b){return`<div class="blk-callout-note" data-en="${esc(en(b.text))}" data-ta="${esc(ta(b.text))}">${esc(en(b.text))}</div>`;},
    'callout-note'(b){return`<div class="blk-callout-note" data-en="${esc(en(b.text))}" data-ta="${esc(ta(b.text))}">${esc(en(b.text))}</div>`;},
    'callout-warning'(b){return`<div class="blk-callout-warning" data-en="${esc(en(b.text))}" data-ta="${esc(ta(b.text))}">${esc(en(b.text))}</div>`;},
    'badge-highlight'(b){return`<div class="blk-badge"><span class="badge-word" data-en="${esc(en(b.text))}" data-ta="${esc(ta(b.text))}">${esc(en(b.text))}</span><div class="badge-sub" data-en="${esc(en(b.subtitle))}" data-ta="${esc(ta(b.subtitle))}">${esc(en(b.subtitle))}</div></div>`;},
    bullet_list(b){return`<ul class="blk-bullet-list">${(b.items||[]).map(it=>`<li data-en="${esc(en(it))}" data-ta="${esc(ta(it))}">${esc(en(it))}</li>`).join('')}</ul>`;},
    divider(){return`<hr class="blk-divider">`;},
    link(b){
      let url=(b.url||'').trim().replace(/^\[+/,'').replace(/\]+.*$/,'');
      if(url&&!/^https?:\/\//i.test(url))url='https://'+url;
      return`<a class="blk-link" href="${esc(url||'#')}" target="_blank" rel="noopener noreferrer"><span class="blk-link-icon">🔗</span><span class="blk-link-body"><span class="blk-link-label" data-en="${esc(en(b.label))}" data-ta="${esc(ta(b.label))}">${esc(en(b.label))}</span>${b.description?`<span class="blk-link-desc" data-en="${esc(en(b.description))}" data-ta="${esc(ta(b.description))}">${esc(en(b.description))}</span>`:''}</span><span class="blk-link-arrow">↗</span></a>`;
    },
    key_value(b){return`<div class="blk-key-value">${(b.items||[]).map(it=>`<div class="kv-row"><span class="kv-k" data-en="${esc(en(it.key))}" data-ta="${esc(ta(it.key))}">${esc(en(it.key))}</span><span class="kv-v" data-en="${esc(en(it.val))}" data-ta="${esc(ta(it.val))}">${esc(en(it.val))}</span></div>`).join('')}</div>`;},
    compare(b){return`<div class="blk-compare">${(b.cols||[]).map(c=>`<div class="cmp-cell ${c.variant||''}">${c.emoji?`<div class="cmp-emoji">${c.emoji}</div>`:''}<div class="cmp-title" data-en="${esc(en(c.title))}" data-ta="${esc(ta(c.title))}">${esc(en(c.title))}</div><div class="cmp-subtitle" data-en="${esc(en(c.subtitle))}" data-ta="${esc(ta(c.subtitle))}">${esc(en(c.subtitle))}</div></div>`).join('')}</div>`;},
  };
  function renderBlocks(blocks){if(!blocks)return '';return blocks.map(b=>{const fn=Blocks[b.type];return fn?fn(b):`<p style="color:var(--tz-loss);font-size:11px">[unknown block: ${esc(b.type)}]</p>`;}).join('');}

  const TICK='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  const CROSS='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
  const TROPHY='<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>';

  /* Card renderers */
  function renderCover(c,i){return`<article class="card-slide${i===0?' is-active':''}" data-card="${i+1}"><span class="level-badge card-level" data-level="beginner"><span class="dots"><i></i><i></i><i></i><i></i></span><span>Beginner</span></span><span class="card-emoji">${c.emoji||''}</span><h2 class="card-title"><span data-en="${esc(en(c.heading||c.title))}" data-ta="${esc(ta(c.heading||c.title))}">${esc(en(c.heading||c.title))}</span></h2><p class="card-body muted" data-en="${esc(en(c.description))}" data-ta="${esc(ta(c.description))}">${esc(en(c.description))}</p><div class="spacer"></div></article>`;}
  function renderVisual(c,i){return`<article class="card-slide" data-card="${i+1}"><div class="visual-hero">${c.emoji||'📸'}</div><h2 class="card-title" style="text-align:center;" data-en="${esc(en(c.title))}" data-ta="${esc(ta(c.title))}">${esc(en(c.title))}</h2>${c.caption?`<p class="card-body muted" style="text-align:center;" data-en="${esc(en(c.caption))}" data-ta="${esc(ta(c.caption))}">${esc(en(c.caption))}</p>`:''}<div class="spacer"></div></article>`;}
  function renderContent(c,i){return`<article class="card-slide" data-card="${i+1}"><div class="card-pill" data-en="${esc(en(c.pill))}" data-ta="${esc(ta(c.pill))}">${esc(en(c.pill))}</div>${renderBlocks(c.blocks)}<div class="spacer"></div></article>`;}
  function renderQuiz(c,i){
    const q=c.question,kind=q.kind==='true-false'?'TRUE / FALSE':'MULTIPLE CHOICE';
    const opts=q.options.map(o=>`<button class="q-option"${o.correct?' data-correct="1"':''}><span class="key">${esc(o.key)}</span><span class="label" data-en="${esc(en(o.text))}" data-ta="${esc(ta(o.text))}">${esc(en(o.text))}</span><span class="tick">${o.correct?TICK:CROSS}</span></button>`).join('');
    return`<article class="card-slide" data-card="${i+1}"${c.gate?' data-needs-answer':''}><div class="card-pill" style="color:var(--tz-accent-1);border-color:var(--tz-border-accent);">💡 <span data-en="${esc(en(c.check_label))}" data-ta="${esc(ta(c.check_label))}">${esc(en(c.check_label))}</span></div><div class="quiz-q" data-q="${c.q_id}"><div class="qhead"><span class="qkind">${kind}</span><span>+${q.xp} XP</span></div><h3 data-en="${esc(en(q.text))}" data-ta="${esc(ta(q.text))}">${esc(en(q.text))}</h3><div class="q-options">${opts}</div><div class="q-feedback"><span style="font-size:16px;line-height:1;">✨</span><div><div class="head" data-ok-en="Correct" data-no-en="Not quite" data-ok-ta="சரி" data-no-ta="தவறு"></div><span data-en="${esc(en(q.feedback.text))}" data-ta="${esc(ta(q.feedback.text))}">${esc(en(q.feedback.text))}</span></div></div></div><div class="spacer"></div></article>`;
  }
  function renderResult(c,i){return`<article class="card-slide" data-card="${i+1}"><div class="card-pill" data-en="LESSON COMPLETE" data-ta="பாடம் முடிந்தது">LESSON COMPLETE</div><div class="result-card is-shown" id="resultCard"><span class="trophy">${TROPHY}</span><div class="score"><span data-score>0</span><span class="of"> / </span><span data-total>${c.quiz_total}</span></div><div class="blurb" data-blurb></div><div class="rewards"><span class="reward-chip"><span class="glyph">⚡</span><span data-xp>0 XP</span></span><span class="reward-chip"><span class="glyph">📖</span> <span data-en="${esc(en(c.lesson_done_label))}" data-ta="${esc(ta(c.lesson_done_label))}">${esc(en(c.lesson_done_label))}</span></span></div></div><div class="spacer"></div></article>`;}

  function wireQuizzes(){
    document.querySelectorAll('[data-q]').forEach(q=>{
      const id=q.dataset.q;TZTutor.scoreBook.register(id);
      const opts=q.querySelectorAll('.q-option'),fb=q.querySelector('.q-feedback');
      opts.forEach(opt=>{
        opt.addEventListener('click',()=>{
          if(q.dataset.locked)return;q.dataset.locked='1';
          const correct=opt.dataset.correct==='1';
          opts.forEach(o=>{o.setAttribute('data-locked','1');if(o===opt)o.setAttribute('data-state',correct?'correct':'wrong');else if(o.dataset.correct==='1'&&!correct)o.setAttribute('data-state','correct');});
          TZTutor.scoreBook.answer(id,correct);
          if(fb){fb.classList.add('is-shown');fb.classList.toggle('is-correct',correct);fb.classList.toggle('is-wrong',!correct);
            const head=fb.querySelector('.head');if(head){const lang=document.documentElement.getAttribute('lang')||'en';head.textContent=correct?(lang==='ta'?(head.dataset.okTa||'சரி'):(head.dataset.okEn||'Correct')):(lang==='ta'?(head.dataset.noTa||'தவறு'):(head.dataset.noEn||'Not quite'));}}
          if(correct)TZTutor.confetti(36);
          document.dispatchEvent(new CustomEvent('tz-answered',{detail:{id,correct}}));
        });
      });
    });
  }

  function setupNav(cards){
    const slides=Array.from(document.querySelectorAll('.card-slide')),dotsEl=$('dots'),prevBtn=$('prevBtn'),nextBtn=$('nextBtn');
    const outItems=Array.from(document.querySelectorAll('#outline li[data-jump]'));
    const deckEl=$('deck');
    let cur=0;
    $('cardTotal').textContent=slides.length;
    slides.forEach((_,i)=>{const seg=document.createElement('div');seg.className='seg'+(i===0?' is-active':'');seg.innerHTML='<div class="fill"></div>';dotsEl.appendChild(seg);});

    function goTo(idx){
      if(idx<0||idx>=slides.length)return;
      if(idx>cur&&slides[cur].dataset.needsAnswer!==undefined&&!slides[cur].querySelector('[data-q][data-locked]'))return;
      const dir=idx>cur?1:-1;
      const leaving=slides[cur],entering=slides[idx];
      // Set directional positions via CSS custom properties
      leaving.style.setProperty('--exit-to',(dir*-52)+'px');
      entering.style.setProperty('--enter-from',(dir*52)+'px');
      // Animate out / in
      leaving.classList.remove('is-active');leaving.classList.add('is-prev');
      entering.classList.remove('is-prev');entering.classList.add('is-active');
      // Sync progress dots
      const segs=dotsEl.querySelectorAll('.seg');
      segs.forEach((s,i)=>{s.classList.toggle('is-done',i<idx);s.classList.toggle('is-active',i===idx);});
      cur=idx;
      prevBtn.disabled=cur===0;nextBtn.disabled=false;$('cardNum').textContent=cur+1;
      outItems.forEach(li=>{const j=parseInt(li.dataset.jump,10)-1;li.classList.toggle('is-active',j===cur);li.classList.toggle('is-done',j<cur);});
      if(cur===slides.length-1){TZTutor.renderResult('#resultCard');nextBtn.disabled=true;}
    }

    prevBtn.addEventListener('click',()=>goTo(cur-1));
    nextBtn.addEventListener('click',()=>goTo(cur+1));
    document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goTo(cur+1);if(e.key==='ArrowLeft')goTo(cur-1);});
    outItems.forEach(li=>li.addEventListener('click',()=>goTo(parseInt(li.dataset.jump,10)-1)));
    document.addEventListener('tz-answered',()=>setTimeout(()=>{if(slides[cur].dataset.needsAnswer!==undefined)nextBtn.disabled=false;},300));

    // Touch swipe — horizontal axis detection, 50px threshold
    let _sx=0,_sy=0,_axis=null;
    deckEl.addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;_sy=e.touches[0].clientY;_axis=null;},{passive:true});
    deckEl.addEventListener('touchmove',e=>{
      if(_axis)return;
      const dx=Math.abs(e.touches[0].clientX-_sx),dy=Math.abs(e.touches[0].clientY-_sy);
      if(dx>10||dy>10)_axis=dx>dy?'h':'v';
    },{passive:true});
    deckEl.addEventListener('touchend',e=>{
      if(_axis!=='h')return;
      const dx=e.changedTouches[0].clientX-_sx;
      if(Math.abs(dx)<50)return;
      if(dx<0)goTo(cur+1);else goTo(cur-1);
      _axis=null;
    });
  }

  function renderLesson(lesson){
    TZTutor.scoreBook.reset();$('dots').innerHTML='';
    const titleEn=esc(en(lesson.title)),titleTa=esc(ta(lesson.title));
    const outlineHtml=lesson.outline.map(o=>`<li data-jump="${o.card}"><span class="marker"><span class="num">${o.card}</span></span><span class="label" data-en="${esc(en(o.label))}" data-ta="${esc(ta(o.label))}">${esc(en(o.label))}</span></li>`).join('');
    $('railLeft').innerHTML=`<div class="rail-card"><div class="head" data-en="PREVIEW" data-ta="முன்னோட்டம்">PREVIEW</div><h3><span data-en="${titleEn}" data-ta="${titleTa}">${titleEn}</span></h3><ul class="outline" id="outline">${outlineHtml}</ul></div><div class="rail-tip"><span class="glyph">👁️</span><div class="body"><span class="k" data-en="PREVIEW MODE" data-ta="முன்னோட்ட பயன்முறை">PREVIEW MODE</span><span data-en="Not live. Use ← → arrow keys." data-ta="நேரடி அல்ல. ← → விசைகள் கொண்டு நகரவும்.">Not live. Use ← → arrow keys.</span></div></div>`;
    $('railRight').innerHTML=`<div class="rail-card"><div class="head" data-en="THIS SESSION" data-ta="இந்த அமர்வு">THIS SESSION</div><h3><em>Preview</em></h3><div class="stat-grid"><div class="stat"><div class="k" data-en="CARDS" data-ta="கார்டுகள்">CARDS</div><div class="v accent">${lesson.cards.length}</div></div><div class="stat"><div class="k" data-en="QUIZZES" data-ta="வினாடி வினாக்கள்">QUIZZES</div><div class="v">${lesson.cards.filter(c=>c.type==='quiz').length}</div></div></div></div>`;
    $('deck').innerHTML=lesson.cards.map((c,i)=>{
      try{switch(c.type){case'cover':return renderCover(c,i);case'visual':return renderVisual(c,i);case'content':return renderContent(c,i);case'quiz':return renderQuiz(c,i);case'result':return renderResult(c,i);default:return`<article class="card-slide" data-card="${i+1}"><p style="color:var(--tz-loss);padding:20px">Unknown type: ${esc(c.type)}</p></article>`;}}
      catch(e){return`<article class="card-slide" data-card="${i+1}"><p style="color:var(--tz-loss);font-size:12px;padding:20px">[Card ${i+1}: ${esc(e.message)}]</p></article>`;}
    }).join('');
    wireQuizzes();setupNav(lesson.cards);
    $('dropzone').classList.add('hidden');$('workspace').style.display='';$('previewBanner').style.display='';
    setTimeout(applyLang,0);
  }

  function loadJSON(raw){
    $('errMsg').textContent='';
    try{renderLesson(adaptItems(JSON.parse(raw)));}
    catch(e){$('errMsg').textContent=e.message;}
  }
  window.loadFromPaste=function(){loadJSON($('jsonPaste').value.trim());};

  window.downloadJSON=function(){
    var data=typeof LESSON_DATA!=='undefined'&&LESSON_DATA?LESSON_DATA:null;
    if(!data)return;
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    var title=data[0]&&data[0].data&&data[0].data.heading?data[0].data.heading.en:'lesson';
    a.href=url;a.download=title.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'')+'.json';
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  };

  window.resetToDropzone=function(){
    $('workspace').style.display='none';$('previewBanner').style.display='none';
    $('dropzone').classList.remove('hidden');$('jsonPaste').value='';$('errMsg').textContent='';
  };

  /* Auto-load if LESSON_DATA is set */
  if(typeof LESSON_DATA!=='undefined'&&LESSON_DATA!==null){
    try{renderLesson(adaptItems(LESSON_DATA));}catch(e){$('errMsg').textContent=e.message;}
  }
})();
</script>
</body>
</html>
