# /etc/nginx/sites-available/tradezen
# Symlink: ln -s /etc/nginx/sites-available/tradezen /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name tradezen.in;

    # ── Main TradeZen app (Node.js on 3000) ───────────────────────────────────
    client_max_body_size 25m;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # ── Block direct access to Python and Launcher ports ─────────────────────
    # (both bind to 127.0.0.1 only, so this is defence-in-depth)
    location ~ ^/(api/python|launcher) {
        deny all;
    }
}

# ── NOTE: Add HTTPS with Certbot once your domain is pointed at the droplet ──
# Run: sudo certbot --nginx -d yourdomain.com
# Certbot will modify this file automatically.
