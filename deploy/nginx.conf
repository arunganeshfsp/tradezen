# /etc/nginx/sites-available/tradezen
# Symlink: ln -s /etc/nginx/sites-available/tradezen /etc/nginx/sites-enabled/

server {
    server_name tradezen.in tradezen.duckdns.org _;

    # ── Main TradeZen app (Node.js on 3000) ───────────────────────────────────
    client_max_body_size 25m;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # ── Block direct access to Python and Launcher ports ─────────────────────
    # (both bind to 127.0.0.1 only, so this is defence-in-depth)
    location ~ ^/(api/python|launcher) {
        deny all;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/tradezen.in-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/tradezen.in-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

# ── HTTP → HTTPS redirect (managed by Certbot) ───────────────────────────────
server {
    if ($host = tradezen.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name tradezen.in tradezen.duckdns.org _;
    return 404; # managed by Certbot
}
